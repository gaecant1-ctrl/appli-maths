<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Écritures d’un nombre</title>

<link rel="stylesheet" href="style.css">

<!-- MathJax -->

<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']]
  },
  chtml: {
    displayAlign: "center"
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>


<body>

  <div class="container">

    <h1>Différentes écritures d’un même nombre</h1>

    <form class="form-bar" onsubmit="analyser(); return false;">
      <input id="input" placeholder="Ex : 14/6   ou   2.75">
      <button type="submit">Valider</button>
    </form>

    <div class="view-bar">
      <button id="modeBtn">Nuage</button>
    </div>

    <!-- ZONE D'AFFICHAGE -->

    <div id="zoneAffichage"></div>

  </div>


<script type="module" src="./main.js"></script>

</body>
</html>
