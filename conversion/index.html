function diviserParPuissanceDe10(nombre, puissance) {
    let str = nombre;

    // Gérer les nombres négatifs
    let negatif = false;
    if (str[0] === '-') {
        negatif = true;
        str = str.slice(1);
    }

    // Séparer la partie entière et la partie décimale
    let [entier, decimal = ""] = str.split('.');

    // Fusionner entier et décimal pour manipuler la position de la virgule
    let total = entier + decimal;

    // Calculer la nouvelle position de la virgule
    let nouvellePosition = entier.length - puissance;

    // Ajouter des zéros devant si besoin (virgule trop à gauche)
    while (nouvellePosition < 0) {
        total = '0' + total;
        nouvellePosition++;
    }
    // Ajouter des zéros derrière si besoin (virgule trop à droite)
    while (nouvellePosition > total.length) {
        total = total + '0';
    }

    // Insérer la virgule à la bonne position
    let resultat = total.slice(0, nouvellePosition) + '.' + total.slice(nouvellePosition);

    // Nettoyer la chaîne (enlever les points superflus)
    if (resultat[0] === '.') resultat = '0' + resultat;
    resultat = resultat.replace(/^0+(\d)/, '$1'); // enlever les zéros superflus devant
    resultat = resultat.replace(/\.$/, ''); // enlever le point final si besoin
    resultat = resultat.replace(/(\.\d*?)0+$/, '$1'); // enlever les zéros inutiles après la virgule
    resultat = resultat.replace(/\.$/, ''); // enlever le point final si besoin

    // Ajouter le signe négatif si besoin
    if (negatif) resultat = '-' + resultat;

    // Si la chaîne est vide ou juste un point, retourner "0"
    if (resultat === '' || resultat === '.') resultat = '0';

    return resultat; // On retourne une chaîne !
}






class Longueur {
  static facteurs = {
    km: 3, hm: 2, dam: 1, m: 0,
    dm: -1, cm: -2, mm: -3
  };

  constructor(texte) {
    const match = texte.trim().match(/^([\d.,]+)\s*(mm|cm|dm|m|dam|hm|km)$/i);
    if (!match) throw new Error("Format invalide");

    this.valeur = match[1].replace(',', '.');
    this.uniteInitiale = match[2];
    this.metres = diviserParPuissanceDe10(this.valeur,-1*Longueur.facteurs[this.uniteInitiale]);
  }

  en(unite) {
if (!(unite in Longueur.facteurs)) throw new Error("Unité inconnue : " + unite);
    // Calculer la différence de puissance entre l'unité initiale et l'unité cible
    const puissance =Longueur.facteurs[unite];

    // Utiliser la fonction diviserParPuissanceDe10 pour obtenir la valeur convertie
    const valeurConvertie = diviserParPuissanceDe10(this.metres, puissance);
    return valeurConvertie;
  }

  estEgal(autre) {
    return Math.abs(this.metres - autre.metres) < 1e-9;
  }

  latex(unite = this.uniteInitiale) {
    return `${this.en(unite)}\\ \\mathrm{${unite}}`;
  }

  static unitesDisponibles() {
    return Object.keys(this.facteurs);
  }
}


class Aire {
  static facteurs = {
    km2: 6, hm2: 4, dam2: 2, m2: 0,
    dm2: -2, cm2: -4, mm2: -6
  };

  constructor(texte) {
    
    const match = texte.trim().match(/^([\d.,]+)\s*(mm2|cm2|dm2|m2|dam2|hm2|km2)$/i);
    if (!match) throw new Error("Format invalide");

    this.valeur = match[1].replace(',', '.');
    this.uniteInitiale = match[2];
    this.metresCarres = diviserParPuissanceDe10(this.valeur,-1*Aire.facteurs[this.uniteInitiale]);
  }

  en(unite) {
    if (!(unite in Aire.facteurs)) throw new Error("Unité inconnue : " + unite);
    const puissance = Aire.facteurs[unite];
    const valeurConvertie = diviserParPuissanceDe10(this.metresCarres, puissance);
    return valeurConvertie;
  }

  estEgal(autre) {
    return Math.abs(this.metresCarres - autre.metresCarres) < 1e-9;
  }

  latex(unite = this.uniteInitiale) {
    const valeur = this.en(unite);
    const uniteSans2 = unite.replace(/2$/, '');
    return `${valeur}\\ \\mathrm{${uniteSans2}}^2`;
  }

  static unitesDisponibles() {
    return Object.keys(this.facteurs);
  }
}


class Volume {
  static facteurs = {
    km3: 9, hm3: 6, dam3: 3, m3: 0,
    dm3: -3, cm3: -6, mm3: -9
  };

  constructor(texte) {
    const match = texte.trim().match(/^([\d.,]+)\s*(mm3|cm3|dm3|m3|dam3|hm3|km3)$/i);
    if (!match) throw new Error("Format invalide");

    this.valeur = match[1].replace(',', '.');
    this.uniteInitiale = match[2];
    this.metresCubes = diviserParPuissanceDe10(this.valeur,-1*Volume.facteurs[this.uniteInitiale]);
  }

    en(unite) {
        if (!(unite in Volume.facteurs)) throw new Error("Unité inconnue : " + unite);
        // Calcule la puissance de 10 à déplacer
        const puissance = Volume.facteurs[unite];
        // Utilise la fonction pour déplacer la virgule
        const valeur = diviserParPuissanceDe10(this.metresCubes, puissance);
        return valeur;
    }


  estEgal(autre) {
    return Math.abs(this.metresCubes - autre.metresCubes) < 1e-9;
  }

  latex(unite = this.uniteInitiale) {
    const valeur = this.en(unite);
    const uniteSans3 = unite.replace(/3$/, '');
    return `${valeur}\\ \\mathrm{${uniteSans3}}^3`;
  }

  static unitesDisponibles() {
    return Object.keys(this.facteurs);
  }
}

function nombreSignificatifAmeliore(type = 'longueur', index1 = 0, index2 = 0) {
  const ecart = Math.abs(index1 - index2);

  // Choix du nombre de chiffres significatifs
  let chiffresMin = 2, chiffresMax = 4;
  if (type === 'aire' || type === 'volume') chiffresMax = 3;
  if (ecart >= 2) chiffresMax = 2;
  const chiffres = Math.floor(Math.random() * (chiffresMax - chiffresMin + 1)) + chiffresMin;

  // Définition des plages et probabilités selon le type
  let plages;
  if (type === 'longueur') {
    plages = [
      { min: 0.1, max: 1, proba: 0.25 },
      { min: 1, max: 10, proba: 0.35 },
      { min: 10, max: 100, proba: 0.25 },
      { min: 100, max: 999, proba: 0.15 }
    ];
  } else if (type === 'aire') {
    plages = [
      { min: 0.01, max: 0.1, proba: 0.15 },
      { min: 0.1, max: 1, proba: 0.25 },
      { min: 1, max: 10, proba: 0.35 },
      { min: 10, max: 100, proba: 0.25 }
    ];
  } else { // volume
    plages = [
      { min: 0.001, max: 0.01, proba: 0.10 },
      { min: 0.01, max: 0.1, proba: 0.20 },
      { min: 0.1, max: 1, proba: 0.30 },
      { min: 1, max: 10, proba: 0.40 }
    ];
  }

  // Si l'écart d'unités est grand, favorise les petites valeurs
  if (ecart >= 1) {
    plages = plages.map(p => {
      if (p.max <= 1) return { ...p, proba: p.proba + 0.10 };
      if (p.min >= 10) return { ...p, proba: p.proba - 0.10 };
      return p;
    });
  }

  // Sélection de la plage selon la proba
  let r = Math.random(), sum = 0, plageChoisie = plages[0];
  for (let p of plages) {
    sum += p.proba;
    if (r <= sum) { plageChoisie = p; break; }
  }

  // Génération du nombre à chiffres significatifs dans la plage choisie
  let valeur, essais = 0;
  do {
    valeur = Math.random() * (plageChoisie.max - plageChoisie.min) + plageChoisie.min;
    valeur = Number.parseFloat(valeur.toPrecision(chiffres));
    essais++;
  } while ((Number.isInteger(valeur) || String(valeur).endsWith('.0')) && essais < 10);

  return valeur.toString();
}

function verifierReponse() {
  const reponseInput = document.getElementById("reponse");
  const bouton = document.getElementById("nextButton");
  const resultatDiv = document.getElementById("resultat");
  const reponse = reponseInput.value.trim().replace(/\^/, '');
  status = null; // Réinitialiser l'état de la réponse avant chaque vérification

  // Retirer les classes de feedback
  resultatDiv.className = "";

  // Toujours retirer le smiley au début
  bouton.classList.remove("survol-smiley", "decu");

  if (!reponse) {
    status = null;  // Rien n'a été saisi
    resultatDiv.textContent = "";
    bouton.classList.add("survol-smiley");
    return;
  }

  let reponseUser;
  try {
    if (bonneLongueur) {
      reponseUser = new Longueur(reponse);
    } else if (bonneAire) {
      reponseUser = new Aire(reponse);
    } else if (bonneVolume) {
      reponseUser = new Volume(reponse);
    }

    // Comparaison insensible à la casse pour l'unité
    const uniteUser = reponseUser.uniteInitiale.toLowerCase();
    const uniteCibleLower = uniteCible.toLowerCase();

    const estBonneValeur = bonneLongueur
      ? reponseUser.estEgal(bonneLongueur)
      : bonneAire
        ? reponseUser.estEgal(bonneAire)
        : reponseUser.estEgal(bonneVolume);

if (estBonneValeur && uniteUser === uniteCibleLower) {

  status = "correct";

  const latexUser =
    bonneLongueur ? reponseUser.latex(uniteCible) :
    bonneAire ? reponseUser.latex(uniteCible) :
    reponseUser.latex(uniteCible);

  resultatDiv.innerHTML =
    `✅ Bonne réponse : \\(${latexUser}\\)`;

  resultatDiv.classList.add("correct");

} else {
      status = "incorrect";  // Réponse incorrecte

        bonneLongueur?.latex(uniteCible) ||
        bonneAire?.latex(uniteCible) ||
        bonneVolume?.latex(uniteCible);
resultatDiv.innerHTML = `❌ Mauvaise réponse. <br>La bonne réponse est : \\(${bonne}\\)`;      resultatDiv.classList.add("incorrect");
      MathJax.typeset();
      bouton.classList.add("decu");

  } catch (e) {

    resultatDiv.classList.add("invalide");
    bouton.classList.add("survol-smiley");

  bouton.disabled = true;

}

    style.innerHTML = `
      @keyframes popfin {
        0% { transform: scale(0.7); opacity: 0; }
        70% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(1); }
      }
    `;
    document.head.appendChild(style);
  }

  // Bouton pour recommencer
  document.getElementById("restartButton").onclick = function() {
    total = 0;
    bonnes = 0;
    document.getElementById("score").textContent = `Score : 0/0`;
    document.getElementById("question").style.display = "";
    document.getElementById("zoneReponse").style.display = "";
    document.getElementById("nextButton").style.display = "";
    genererExercice();
    document.getElementById("resultat").textContent = "";
  };
}


/**
 * Lance plusieurs salves de confettis espacées dans le temps.
 * @param {number} nbSalves - Nombre de salves à lancer.
 * @param {number} [interval=350] - Intervalle (en ms) entre chaque salve.
 */
function confettiSalves(nbSalves, interval = 350) {
  for (let i = 0; i < nbSalves; i++) {
    setTimeout(() => {
      confetti({
        particleCount: 60 + Math.floor(40 * Math.random()), // un peu de variété
        spread: 70 + 60 * Math.random(),
        origin: { y: 0.5 + 0.2 * Math.random() }
      });
    }, 400 + i * interval); // 400ms pour laisser l'animation popfin démarrer
  }
}



document.getElementById("nextButton").addEventListener('click', function() {
  // Générer un nouvel exercice
  genererExercice();

 
});


document.addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    const input = document.getElementById('reponse');
    const nextButton = document.getElementById('nextButton');
    // Si on attend une réponse, Entrée valide la réponse
    if (!input.disabled && nextButton.disabled) {
      verifierReponse();
      event.preventDefault();
    }
    // Si la réponse a été validée, Entrée passe à l'exercice suivant
    else if (input.disabled && !nextButton.disabled) {
      nextButton.click();
      event.preventDefault();
    }
  }
});


window.addEventListener("load", () => {
  if (window.MathJax) {
    MathJax.startup.promise.then(() => {
      genererExercice();
    });
  } else {
    console.error("MathJax n'a pas été chargé.");
  }
});



function envoyerScoreFormspree(score, identifiant) {
  const formData = new FormData();
  formData.append("score", score);
  formData.append("identifiant", identifiant);
  formData.append("page_url", window.location.href);

  fetch("https://formspree.io/f/xzzrojeb", {
    method: "POST",
    body: formData,
    headers: { "Accept": "application/json" }
  })
  .then(response => {
    if (response.ok) {
      console.log("Score envoyé !");
    } else {
      response.json().then(data => {
        console.error("Erreur lors de l'envoi du score :", data.error || data);
      });
    }
  })
  .catch(error => {
    console.error("Erreur réseau lors de l'envoi du score :", error);
  });
}
