<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercices de Conversion</title>
  <link rel="stylesheet" href="style.css">

  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>

  <header>
    <span id="titre_appli">Exercices de <b>conversion</b></span>
    <div class="header-actions" id="topButtonsBar"></div>
  </header>

  <div id="paramsOverlay" class="params-overlay">
    <div id="paramsModal" class="params-modal">
      <button id="paramsClose" class="params-close" aria-label="Fermer">✕</button>
      <h2 class="params-title">Paramètres</h2>

      <div class="param-group">
        <div class="param-label">Type de conversion <span class="shuffle-hint">(rien coché = aléatoire)</span></div>
        <div class="param-buttons" id="grpTypeConversion" data-family="typeConversion"></div>
      </div>
    </div>
  </div>

  <main>
    <div id="container">
      <h1>Exercices de Conversion <br> (Longueur, Aire, Volume)</h1>
      <div id="score">Score : 0/0</div>
      <div id="question"></div>
      <label for="reponse" style="position:absolute;left:-9999px;">Réponse</label>

      <div id="zoneReponse">
        <input type="text" id="reponse" placeholder="Tapez votre réponse" autocomplete="off"
          autocorrect="off" spellcheck="false">
      </div>
      <div id="resultat"></div>
      <div>
        <button id="nextButton" disabled>Nouvel exercice</button>
      </div>
    </div>
  </main>

  <iframe name="dummyFrame" style="display:none;"></iframe>

  <script src="conversions.js?v=3"></script>
  <script src="FicheConversion.js?v=3"></script>
  <script src="app.js?v=3"></script>

</body>
</html>
