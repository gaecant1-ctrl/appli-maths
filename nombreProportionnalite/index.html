<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Quiz NombreMot</title>
  <link rel="stylesheet" href="style.css">

  <!-- MathJax (si tu veux du LaTeX dans les énoncés) -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['$$', '$$']]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <!-- Confetti (optionnel) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- Conteneur du quiz -->
  <div id="app"></div>

  <!-- Scripts de ton projet -->
  <script src="Utils.js"></script>
  <script src="Nombre.js"></script>
  <script src="Grandeur.js"></script>
  <script src="Expression.js"></script>
  <script src="Somme.js"></script>
  <script src="Produit.js"></script>
  <script src="ObjetString.js"></script>
  <script src="Grader.js"></script>
  <script src="Exercice.js"></script>
  <script src="Niveau.js"></script>
  <script src="Enonce.js"></script>
    <script src="Animation.js"></script>
  <script src="AnimationFinale.js"></script>
  <script src="Quiz.js"></script>

  <script>
  
window.addEventListener('load', () => {
  const SEED_BASE = "quiz-Proportionnalite-2025";

function buildProportionnalite(zone, index, onRejet) { // <--- 1. On récupère le callback ici
    const opts = {
        sharedOptions: { affichageAvecLettre: "" }
    };

    const inst = new EnonceProportionnalite(opts);
    
    // 2. On le transmet à la méthode qui va créer l'ExerciceExpression
    return inst.buildExercise(zone, index, onRejet); 
}

  const quiz = new Quiz({
    mount: '#app',
    nbQuestions: 20,
    buildExercise: buildProportionnalite, // On pointe vers la nouvelle fonction
    texts: {
      ready: "Problèmes de Proportionnalité ou non!!! ",
      readyContent: `
        <p style="font-size:1.2em; line-height:1.5; margin:20px 0; text-align:center;">
          Résolvez ces petits problèmes en indiquant bien <strong>l'unité</strong> dans votre réponse !<br>
          <em>(ex: 120 km, 45 €, 1 h + 15 min)</em>
        </p>
      `
    }
  });

  quiz.start();
});

  </script>
  
</body>
</html>
