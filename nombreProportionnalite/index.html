<body>

  <!-- Conteneur du quiz -->

  <!-- Scripts de ton projet -->
  <script src="Utils.js"></script>
  <script src="Nombre.js"></script>
  <script src="Grandeur.js"></script>

  <script src="Enonce.js"></script>
    <script src="Animation.js"></script>
  <script src="AnimationFinale.js"></script>
  <script src="Quiz.js"></script>

  <script>
  
window.addEventListener('load', () => {
  const SEED_BASE = "quiz-Proportionnalite-2025";

  // 1. On crée la liste des types disponibles (ex: de 1 à 25)
  // Tu peux en enlever si tu veux restreindre le choix !
  let listeTypes = Array.from({length: 25}, (_, i) => i + 1);

  // 2. On la mélange tout de suite au démarrage (Algorithme de Fisher-Yates)
  for (let i = listeTypes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [listeTypes[i], listeTypes[j]] = [listeTypes[j], listeTypes[i]];
  }

  // 3. Notre fonction de fabrication prend simplement le type dans la liste mélangée
  function buildProportionnalite(zone, index, onRejet) { 
    // index commence à 1, donc pour le tableau on fait index - 1
    // Si l'index dépasse 25, le "% listeTypes.length" permet de recommencer le cycle sans planter
    const typeUnique = listeTypes[(index - 1) % listeTypes.length];

    const opts = {
        sharedOptions: { affichageAvecLettre: "" },
        typeForce: typeUnique // On crée une option sur mesure
    };

    const inst = new EnonceProportionnalite(opts);
    return inst.buildExercise(zone, index, onRejet); 
  }

  // Le reste du Quiz ne bouge pas d'un poil !
  const quiz = new Quiz({
    mount: '#app',
    nbQuestions: 20, // Ici tu demandes 20 questions, elles seront toutes uniques
    buildExercise: buildProportionnalite, 
    texts: {
      ready: "Problèmes de Proportionnalité ou non!!! ",
      readyContent: `<p>Résolvez ces petits problèmes...</p>`
    }
  });

  quiz.start();
});

  </script>
  
</body>
</html>
