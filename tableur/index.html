    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;

        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

        }

        .progress-header {
            display: flex;

        .progress-bar-bg {
            flex: 1;
            height: 10px;

            height: 100%;

        .consigne-box {
            background-color: #e3f2fd;
            border-left: 5px solid #2196f3;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .spreadsheet-container { overflow-x: auto; margin-bottom: 20px; }
        .spreadsheet {
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
            table-layout: fixed;
        }
        .spreadsheet th, .spreadsheet td {
            border: 1px solid #cfd8dc;
            height: 38px;
            text-align: center;
            font-size: 14px;
            padding: 0;
        }
        .label-cell, .col-header { background: #eceff1; font-weight: bold; color: #607d8b; cursor: default; user-select: none; }
        

        /* Force une largeur fixe sur la colonne des numéros de lignes */
td.label-cell, th.label-cell {
    width: 40px !important;
    min-width: 40px !important;
    max-width: 40px !important;
    background: #eceff1; 
    font-weight: bold; 
    color: #607d8b; 
}

        /* Force le gras sur les textes de cellules qui commencent par & */
.cell-text strong {
    font-weight: bold !important;
    display: inline-block;
}

        /* États dynamiques des cellules */
        .cible { background-color: #fff9c4 !important; border: 2px solid #fbc02d !important; font-weight: bold; }

<body>

<div class="quiz-container" id="quiz-ui">
    <div class="progress-header">
        <span id="step-label">Exercice 1 / 3</span>
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        <button class="btn-toggle" style="background:#90a4ae; color:white; font-size:11px" onclick="app.toggleView()">Formules / Valeurs</button>

    <div class="consigne-box" id="consigne"></div>

    <div class="spreadsheet-container">
        <table class="spreadsheet" id="sheet"></table>
    </div>

        <input type="text" id="formula-bar" class="formula-input" placeholder="Tapez votre formule ici..." autocomplete="off">
        <button class="btn-primary" id="btn-validate" onclick="app.checkAnswer()">Tester la formule</button>
        <button class="btn-giveup" id="btn-giveup" onclick="app.giveUp()">Abandonner</button>
        <button class="btn-next" id="btn-next" onclick="app.nextStep()">Continuer ➔</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<div class="quiz-container" id="final-screen">
    <h1>Quiz Terminé !</h1>
    <p>Vous êtes arrivé à la fin de tous les exercices de ce module.</p>
    <div class="score-big">Entraînement Clôturé ! 🎉</div>
    <button class="btn-primary" onclick="location.reload()">Recommencer</button>
</div>

<script>
class QuizApp {
    constructor(scenarios) {
        this.scenarios = scenarios;
        this.currentScenarioIndex = 0;
        this.currentStepIndex = 0;
        
        this.viewMode = "valeurs"; 
        this.currentContext = {};
        
        this.validatedFormulas = {}; 
        this.currentStepFormulas = {}; 
        this.stepStatus = "idle"; 

        this.initScenario();
        
        document.getElementById('formula-bar').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.checkAnswer();
        });
    }

    initScenario() {
        const sn = this.scenarios[this.currentScenarioIndex];
        this.currentStepIndex = 0;
        this.validatedFormulas = {};
        
        // Tout est à plat : les indices de lignes correspondent exactement aux index du tableau + 1
        this.currentContext = {};
        sn.data.forEach((row, rIdx) => {
            const actualRow = rIdx + 1;
            row.forEach((val, cIdx) => {
                const id = `${String.fromCharCode(65 + cIdx)}${actualRow}`;
                this.currentContext[id] = val;
            });
        });

        this.initStep();
    }

    initStep() {
        document.getElementById('formula-bar').value = "";
        document.getElementById('formula-bar').disabled = false;
        document.getElementById('btn-validate').style.display = "block";
        document.getElementById('btn-giveup').style.display = "block";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('feedback').textContent = "";
        
        this.currentStepFormulas = {};
        this.stepStatus = "idle";

        const totalScenarios = this.scenarios.length;
        document.getElementById('step-label').textContent = `Tableau ${this.currentScenarioIndex + 1} / ${totalScenarios}`;
        document.getElementById('progress-fill').style.width = `${(this.currentScenarioIndex / totalScenarios) * 100}%`;

        const step = this.scenarios[this.currentScenarioIndex].steps[this.currentStepIndex];
        document.getElementById('consigne').innerHTML = `<strong>Mission :</strong> ${step.instruction}`;

        this.render();
        // Force MathJax à restituer le LaTeX injecté dynamiquement
// Déclenche le rendu LaTeX de manière sécurisée
if (window.MathJax && typeof MathJax.typesetPromise === "function") {
    MathJax.typesetPromise();
} else {
    // Si MathJax n'est pas encore tout à fait prêt, on réessaie 100ms plus tard
    setTimeout(() => {
        if (window.MathJax && typeof MathJax.typesetPromise === "function") {
            MathJax.typesetPromise();
        }
    }, 100);
}

// Remet le curseur automatiquement dans la barre de formule
document.getElementById('formula-bar').focus();
    }

    render() {
        const sn = this.scenarios[this.currentScenarioIndex];
        const currentStep = sn.steps[this.currentStepIndex];
        const table = document.getElementById('sheet');
        table.innerHTML = "";

        // Formater le texte et gérer l'accent gras avec le "&"
        const formatTexte = (texte) => {
            const chaine = String(texte);
            if (chaine.startsWith('&')) {
                return `<strong style="font-weight: bold;">${chaine.substring(1)}</strong>`;
            }
            return chaine;
        };

        // En-têtes de colonnes grises (A, B, C...) basées sur la longueur de la ligne 1
        const maxCols = sn.data[0].length;
        const hRow = document.createElement('tr');
        hRow.innerHTML = '<th class="label-cell"></th>';
        for (let i = 0; i < maxCols; i++) {
            hRow.innerHTML += `<th class="col-header">${String.fromCharCode(65 + i)}</th>`;
        }
        table.appendChild(hRow);

        // Rendu de toutes les lignes de données à plat (Ligne 1, Ligne 2, Ligne 3...)
        sn.data.forEach((row, rIdx) => {
            const actualRow = rIdx + 1; // Alignement parfait : index 0 -> Ligne 1
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="label-cell">${actualRow}</td>`;

            row.forEach((val, cIdx) => {
                const colLetter = String.fromCharCode(65 + cIdx);
                const cellId = `${colLetter}${actualRow}`;
                
                let td = document.createElement('td');
                
                if (this.validatedFormulas[cellId]) {
                    td.className = "status-valide-precedent";
                    td.textContent = this.getDisplay(cellId, this.validatedFormulas[cellId]);
                }
                else if (cellId === currentStep.targetCell) {
                    td.className = "cible";
                    if(this.stepStatus === "success") td.className += " status-success";
                    if(this.stepStatus === "error") td.className += " status-error";
                    td.textContent = this.getDisplay(cellId, this.currentStepFormulas[cellId]);
                } 
                else {
                    const offset = this.getOffset(cellId, currentStep.targetCell, currentStep.direction);
                    if (offset > 0 && offset <= currentStep.nbEtirements) {
                        td.className = "etiree";
                        if(this.stepStatus === "success") td.className += " status-success";
                        if(this.stepStatus === "error") td.className += " status-error";
                        td.textContent = this.getDisplay(cellId, this.currentStepFormulas[cellId]);
                    } else {
                        // Gestion unifiée du contenu
                        const currentVal = this.currentContext[cellId];
                        const isNum = !isNaN(parseFloat(currentVal)) && isFinite(currentVal);
                        
                        if (isNum) {
                            td.innerHTML = `<input type="text" class="editable-val" value="${currentVal}" oninput="app.updateVal('${cellId}', this.value)">`;
                        } else {
                            td.innerHTML = `<div class="cell-text" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">${formatTexte(currentVal)}</div>`;
                        }
                    }
                }
                tr.appendChild(td);
            });
            table.appendChild(tr);
        });
    }

    getOffset(id, target, dir) {
        const tC = target[0], tR = parseInt(target.substring(1));
        const cC = id[0], cR = parseInt(id.substring(1));
        if (dir === "bas" && cC === tC && cR > tR) return cR - tR;
        if (dir === "droite" && cR === tR && cC.charCodeAt(0) > tC.charCodeAt(0)) return cC.charCodeAt(0) - tC.charCodeAt(0);
        return 0;
    }

    propagate(f, offset, dir) {
        return f.replace(/(\$?)([A-Z]+)(\$?)([0-9]+)/g, (m, dC, col, dR, row) => {
            let r = parseInt(row), c = col.charCodeAt(0);
            if (dir === "bas" && dR !== "$") r += offset;
            if (dir === "droite" && dC !== "$") c += offset;
            return dC + String.fromCharCode(c) + dR + r;
        });
    }

getDisplay(id, f) {
    if (!f) return (id === this.scenarios[this.currentScenarioIndex].steps[this.currentStepIndex].targetCell) ? "?" : "";
    if (this.viewMode === "formules") return f;
    try { 
        // CORRECT : Le nom est attaché et la valeur est attribuée immédiatement
        const resultatBrut = this.evaluate(f, this.currentContext); 
        return this.formaterNombre(resultatBrut);
    } catch { 
        return "#VALEUR!"; 
    }
}

    updateVal(id, v) {
        this.currentContext[id] = v;
        this.render();
    }

    toggleView() {
        this.viewMode = this.viewMode === "valeurs" ? "formules" : "valeurs";
        this.render();
    }

    // Arrondit proprement à 10 chiffres après la virgule maximum pour effacer les bugs binaires
formaterNombre(valeur) {
    const num = parseFloat(valeur);
    if (isNaN(num)) return valeur;
    // On arrondit à la 10e décimale, puis parseFloat supprime les zéros inutiles à la fin
    return parseFloat(num.toFixed(10));
}

 /**
     * L'élève abandonne l'exercice complet : 
     * On passe directement au scénario suivant, peu importe l'étape en cours
     */
    giveUp() {
        this.currentScenarioIndex++;
        if (this.currentScenarioIndex < this.scenarios.length) {
            this.initScenario();
        } else {
            // Si c'était le dernier exercice, on affiche l'écran final
            document.getElementById('quiz-ui').style.display = "none";
            document.getElementById('final-screen').style.display = "block";
            document.getElementById('progress-fill').style.width = "100%";
        }
    }

    checkAnswer() {
        const input = document.getElementById('formula-bar').value.trim().toUpperCase().replace(/\s/g, '');
        const sn = this.scenarios[this.currentScenarioIndex];
        const step = sn.steps[this.currentStepIndex];

        if (!input.startsWith("=")) {
            this.feedback("Erreur : Commencez par '='", "#d32f2f");
            return;
        }

this.currentStepFormulas[step.targetCell] = input;
        
        // --- NOUVELLE LOGIQUE D'ÉTIREMENT GLOBAL ---
        if (step.direction === "partout") {
            // On boucle sur toutes les lignes et colonnes du tableau pour propager la formule
            for (let r = 1; r <= sn.data.length; r++) {
                for (let c = 0; c < sn.data[0].length; c++) {
                    const colLetter = String.fromCharCode(65 + c);
                    const currentId = `${colLetter}${r}`;
                    
                    // On n'étire que sur les cases qui sont initialement vides dans le scénario
                    const targetColIndex = step.targetCell[0].charCodeAt(0) - 65;
                    const targetRowIndex = parseInt(step.targetCell.substring(1));
                    
                    if (r >= targetRowIndex && c >= targetColIndex) {
                        const offsetRow = r - targetRowIndex;
                        const offsetCol = c - targetColIndex;
                        
                        // On propage d'abord vers la droite, puis vers le bas
                        let propagated = this.propagate(input, offsetCol, "droite");
                        propagated = this.propagate(propagated, offsetRow, "bas");
                        
                        this.currentStepFormulas[currentId] = propagated;
                    }
                }
            }
        } else {
            // Logique classique pour "bas" ou "droite" (inchangée)
            for(let o = 1; o <= step.nbEtirements; o++) {
                const targetCol = step.targetCell[0];
                const targetRow = parseInt(step.targetCell.substring(1));
                const nextId = step.direction === "bas" ? `${targetCol}${targetRow + o}` : `${String.fromCharCode(targetCol.charCodeAt(0) + o)}${targetRow}`;
                this.currentStepFormulas[nextId] = this.propagate(input, o, step.direction);
            }
        }

        try {
            let passed = true;
            for (let i = 0; i < 3; i++) {
                const testCtx = i === 0 ? this.getCurrentNumericContext() : this.genRandomCtx();
                for (let cell in this.validatedFormulas) {
                    testCtx[cell] = this.evaluate(this.validatedFormulas[cell], testCtx);
                }
                for (let o = 0; o <= step.nbEtirements; o++) {
                    const uF = this.propagate(input, o, step.direction);
                    const rF = this.propagate(step.refFormula, o, step.direction);
                    if (this.evaluate(uF, testCtx) !== this.evaluate(rF, testCtx)) {
                        passed = false; break;
                    }
                }
            }

            if (passed) {
                this.stepStatus = "success";
                this.feedback("Formule correcte ! Les calculs et l'étirement sont parfaits.", "#2e7d32");
                
                document.getElementById('btn-validate').style.display = "none";
                document.getElementById('btn-giveup').style.display = "none";
                document.getElementById('btn-next').style.display = "block";
                document.getElementById('formula-bar').disabled = true;

                Object.assign(this.validatedFormulas, this.currentStepFormulas);
                for(let key in this.currentStepFormulas) {
                    this.currentContext[key] = this.evaluate(this.currentStepFormulas[key], this.currentContext);
                }
            } else {
                this.stepStatus = "error";
                this.feedback("Formule appliquée et étirée. Cependant, le résultat ou la logique d'étirement est incorrecte.", "#c62828");
            }
        } catch {
            this.stepStatus = "error";
            this.feedback("Formule appliquée, mais elle génère une erreur (#VALEUR!).", "#c62828");
        }

        this.render();
    }

    nextStep() {
        this.currentStepIndex++;
        const sn = this.scenarios[this.currentScenarioIndex];
        if (this.currentStepIndex < sn.steps.length) {
            this.initStep();
        } else {
            this.currentScenarioIndex++;
            if (this.currentScenarioIndex < this.scenarios.length) {
                this.initScenario();
            } else {
                document.getElementById('quiz-ui').style.display = "none";
                document.getElementById('final-screen').style.display = "block";
                document.getElementById('progress-fill').style.width = "100%";
            }
        }
    }

 evaluate(f, ctx) {
        let e = f.substring(1);
        const fn = (m, p) => {
            const cells = this.parseRange(p);
            const vals = cells.map(c => parseFloat(ctx[c.replace(/\$/g,'')]) || 0);
            return m.includes("MOY") || m.includes("AVE") ? `(${vals.reduce((a,b)=>a+b,0)}/${vals.length})` : `(${vals.reduce((a,b)=>a+b,0)})`;
        };
        e = e.replace(/(?:MOYENNE|AVERAGE)\(([^)]+)\)/g, fn);
        e = e.replace(/(?:SOMME|SUM)\(([^)]+)\)/g, fn);
        e = e.replace(/\$?[A-Z]+\$?[0-9]+/g, m => {
            const v = parseFloat(ctx[m.replace(/\$/g,'')]);
            return isNaN(v) ? 0 : v;
        });

        // --- AJOUTE CETTE LIGNE ICI POUR GÉRER LES PUISSANCES ^ ---
        e = e.replace(/\^([0-9]+)/g, '**$1'); 

        return Function(`return (${e})`)();
    }

    parseRange(r) {
        const p = r.replace(/\$/g,'').split(':');
        if (p.length === 1) return [p[0]];
        const s = p[0], en = p[1];
        const cS = s.match(/[A-Z]+/)[0], rS = parseInt(s.match(/[0-9]+/)[0]);
        const cE = en.match(/[A-Z]+/)[0], rE = parseInt(en.match(/[0-9]+/)[0]);
        let res = [];
        for (let row = rS; row <= rE; row++) {
            for (let col = cS.charCodeAt(0); col <= cE.charCodeAt(0); col++) res.push(String.fromCharCode(col) + row);
        }
        return res;
    }

    getCurrentNumericContext() {
        let numericCtx = {};
        for (let key in this.currentContext) {
            const num = parseFloat(this.currentContext[key]);
            numericCtx[key] = !isNaN(num) ? num : 0;
        }
        return numericCtx;
    }

    genRandomCtx() {
        let c = {};
        for (let r = 1; r <= 15; r++) {
            for (let col = 0; col < 8; col++) c[`${String.fromCharCode(65 + col)}${r}`] = Math.floor(Math.random() * 20) + 1;
        }
        return c;
    }

    feedback(m, c) {
        const f = document.getElementById('feedback');
        f.textContent = m; f.style.color = c;
    }
}

// --- INITIALISATION DU QUIZ COMPLÈTEMENT À PLAT ---
const app = new QuizApp([
    {
        // EXERCICE 1 : Moyenne (Ligne 1 = En-têtes textuelles, Données de 2 à 4)
        data: [
            ["&Élève", "&Note 1", "&Note 2", "&Note 3", "&Moyenne"], // Ligne 1
            ["Léa", 5, 4, 6, ""],                              // Ligne 2
            ["Bob", 12, 14, 10, ""],                            // Ligne 3
            ["Charlie", 8, 9, 7, ""]                            // Ligne 4
        ],
        steps: [
            {
                instruction: "Donnez la formule à taper en <strong>E2</strong>  prête à être étirée vers le bas jusqu'en <strong>E4</strong>.",
                targetCell: "E2",
                refFormula: "=MOYENNE(B2:D2)",
                direction: "bas",
                nbEtirements: 2
            }
        ]
    },
    {
        // EXERCICE 2 : Facture (Double calcul successif)
        data: [
            ["&Article", "&Prix Unit.", "&Quantité", "&Total"],     // Ligne 1
            ["Stylos", 1.5, 10, ""],                            // Ligne 2
            ["Cahiers", 4, 5, ""],                              // Ligne 3
            ["Gommes", 0.8, 20, ""],                            // Ligne 4
            ["", "", "&Total à payer", ""]              // Ligne 5
        ],
        steps: [
            {
                instruction: "Étape 1 : Donnez la formule à taper en <strong>D2</strong>  prête à être étirée vers le bas jusqu'en <strong>D4</strong>.",
                targetCell: "D2",
                refFormula: "=B2*C2",
                direction: "bas",
                nbEtirements: 2
            },
            {
                instruction: "Étape 2 : Donnez la formule à taper en <strong>D5</strong>",
                targetCell: "D5",
                refFormula: "=SOMME(D2:D4)",
                direction: "bas",
                nbEtirements: 0
            }
        ]
    },
    {
        // EXERCICE 7 : Calcul de TVA et TTC à plat (Taux fixé dans la consigne)
        data: [
            ["&Article", "&Prix\nHT", "&Montant\nTVA", "&Prix\nTTC"], // Ligne 1
            ["Ordinateur", 500, "", ""],                        // Ligne 2 (Cibles en C2 puis D2)
            ["Smartphone", 300, "", ""],                        // Ligne 3
            ["Tablette", 200, "", ""]                           // Ligne 4
        ],
        steps: [
            {
                // Étape 1 : Le montant de la TVA
                instruction: "La TVA est de 20%. Écrivez la formule à taper en <strong>C2</strong> prête à être étirée jusqu'en <strong>C4</strong>.",
                targetCell: "C2",
                refFormula: "=B2*0.2", // Formule attendue : Prix HT * 0.2
                direction: "bas",
                nbEtirements: 2
            },
            {
                // Étape 2 : Le prix TTC
                instruction: "Écrivez la formule à taper en <strong>D2</strong> prête à être étirée jusqu'en <strong>D4</strong>.",
                targetCell: "D2",
                refFormula: "=B2+C2", // Accepte aussi =B2*(1+0.2) ou =B2+B2*0.2 grâce au fuzzing numérique
                direction: "bas",
                nbEtirements: 2
            }
        ]
