<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      options: { ignoreHtmlClass: 'cell-text', processHtmlClass: 'consigne-box' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>   
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Tableur - Fonds Immuables</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f0f4f8;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    .quiz-container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        max-width: 850px;
        width: 100%;
    }

    .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .progress-bar-bg {
        flex: 1;
        height: 10px;
        background: #e0e6ed;
        margin: 0 20px;
        border-radius: 5px;
        overflow: hidden;
    }
    #progress-fill {
        height: 100%;
        background: #2196f3;
        width: 0%;
        transition: width 0.3s ease;
    }

    .consigne-box {
        background-color: #e3f2fd;
        border-left: 5px solid #2196f3;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
    }
    .consigne-box strong { font-weight: 800; color: #000000; }

    .spreadsheet-container { overflow-x: auto; margin-bottom: 20px; }
    .spreadsheet {
        border-collapse: collapse;
        width: 100%;
        table-layout: fixed;
    }
    .spreadsheet th, .spreadsheet td {
        border: 1px solid #cfd8dc;
        height: 38px;
        text-align: center;
        font-size: 14px;
        padding: 0;
        white-space: pre-line;
    }
    
    td.label-cell, th.label-cell {
        width: 40px !important;
        background: #eceff1; 
        font-weight: bold; 
        color: #607d8b; 
        user-select: none;
    }
    .col-header { background: #eceff1; font-weight: bold; color: #607d8b; user-select: none; }

    /* --- FONDS IMMUABLES (RÈGLE ABSOLUE) --- */
/* Le texte pur (Cyan saturé comme demandé !) */
.spreadsheet td.cell-text-bg { 
    background-color: #00ffff !important; 
    color: #004d40; /* Un bleu/vert très foncé pour que le texte reste hyper lisible sur le cyan */
}
    .spreadsheet td.cell-numeric-bg { 
        background-color: #ffff00 !important; 
    }
    .spreadsheet td.cell-numeric-bg input.editable-val {
        background-color: #ffff00 !important;
        width: 100%; height: 100%; border: none; text-align: center;
        font-size: 14px; font-family: inherit; color: #1565c0; font-weight: bold; outline: none;
    }

    /* Orange saturé cible et orange doux étirement */
    .spreadsheet td.cible { background-color: #ff9800 !important; font-weight: bold !important; color: #ffffff !important; }
    .spreadsheet td.etiree { background-color: #fff3e0 !important; font-style: italic; color: #e65100; }

    /* --- VALIDATION : DESORMAIS UNIQUEMENT SUR LES BORDURES --- */
    .spreadsheet td.status-success { 
        border: 3px solid #2e7d32 !important; 
        color: #2e7d32 !important;
        font-style: normal;
    }
    .spreadsheet td.cible.status-success { color: #ffffff !important; } 

    .spreadsheet td.status-error { 
        border: 3px solid #c62828 !important; 
        color: #c62828 !important; 
    }
    .spreadsheet td.cible.status-error { color: #ffffff !important; }

    /* L'historique n'écrase plus le fond, il applique juste une fine bordure verte de validation définitive */
    .spreadsheet td.status-valide-precedent { 
        border: 2px solid #2e7d32 !important; 
        font-weight: bold !important; 
        font-style: normal; 
    }
    /* Si la cible validée précédemment était orange, le texte reste blanc pour la lisibilité */
    .spreadsheet td.cible.status-valide-precedent { color: #ffffff !important; }

    .formula-zone { display: flex; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
    .formula-input { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #ced4da; border-radius: 6px; font-family: 'Courier New', monospace; font-weight: bold; }
    .formula-input:focus { border-color: #2196f3; outline: none; }

    button { padding: 10px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-primary { background: #2196f3; color: white; }
    .btn-primary:hover { background: #1976d2; }
    .btn-giveup { background: #e0e0e0; color: #616161; }
    .btn-giveup:hover { background: #b0bec5; color: #212121; }
    .btn-next { background: #4caf50; color: white; display: none; }

    .feedback { margin-top: 15px; text-align: center; font-weight: bold; min-height: 24px; }
    #final-screen { display: none; text-align: center; }
    .score-big { font-size: 48px; color: #2196f3; margin: 20px 0; }
  </style>
</head>
<body>

<div class="quiz-container" id="quiz-ui">
    <div class="progress-header">
        <span id="step-label"></span>
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        <button class="btn-toggle" style="background:#90a4ae; color:white; font-size:11px" onclick="app.toggleView()">Formules / Valeurs</button>
    </div>
    <div class="consigne-box" id="consigne"></div>
    <div class="spreadsheet-container">
        <table class="spreadsheet" id="sheet"></table>
    </div>
    <div class="formula-zone">
        <input type="text" id="formula-bar" class="formula-input" placeholder="Tapez votre formule ici..." autocomplete="off">
        <button class="btn-primary" id="btn-validate" onclick="app.checkAnswer()">Tester la formule</button>
        <button class="btn-giveup" id="btn-giveup" onclick="app.giveUp()">Abandonner</button>
        <button class="btn-next" id="btn-next" onclick="app.nextStep()">Continuer ➔</button>
    </div>
    <div id="feedback" class="feedback"></div>
</div>

<div class="quiz-container" id="final-screen">
    <h1>Quiz Terminé !</h1>
    <p>Vous êtes arrivé à la fin de tous les exercices de ce module.</p>
    <div class="score-big">Entraînement Clôturé ! 🎉</div>
    <button class="btn-primary" onclick="location.reload()">Recommencer</button>
</div>

<script>
class QuizApp {
    constructor(scenarios) {
        this.scenarios = scenarios;
        this.currentScenarioIndex = 0;
        this.currentStepIndex = 0;
        this.viewMode = "valeurs"; 
        this.currentContext = {};     
        this.validatedFormulas = {}; 
        this.currentStepFormulas = {}; 
        this.stepStatus = "idle"; 
        this.scenographicMap = {}; 

        this.initScenario();
        document.getElementById('formula-bar').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.checkAnswer();
        });
    }

    initScenario() {
        const sn = this.scenarios[this.currentScenarioIndex];
        this.currentStepIndex = 0;
        this.validatedFormulas = {};
        this.currentContext = {};
        this.scenographicMap = {};
        
        sn.data.forEach((row, rIdx) => {
            const actualRow = rIdx + 1;
            row.forEach((rawString, cIdx) => {
                const id = `${String.fromCharCode(65 + cIdx)}${actualRow}`;
                let cleanVal = String(rawString);
                if (cleanVal.startsWith('&&')) cleanVal = cleanVal.substring(2);
                else if (cleanVal.startsWith('&') || cleanVal.startsWith('!')) cleanVal = cleanVal.substring(1);
                this.currentContext[id] = cleanVal;
            });
        });

        sn.steps.forEach((step) => {
            this.scenographicMap[step.targetCell] = "cible";
            const targetColIndex = step.targetCell[0].charCodeAt(0) - 65;
            const targetRowIndex = parseInt(step.targetCell.substring(1));

            if (step.direction === "partout") {
                sn.data.forEach((row, rIdx) => {
                    const actualRow = rIdx + 1;
                    row.forEach((_, cIdx) => {
                        if (actualRow >= targetRowIndex && cIdx >= targetColIndex) {
                            const cellId = `${String.fromCharCode(65 + cIdx)}${actualRow}`;
                            if (cellId !== step.targetCell) this.scenographicMap[cellId] = "etiree";
                        }
                    });
                });
            } else {
                for (let o = 1; o <= step.nbEtirements; o++) {
                    const nextId = step.direction === "bas" 
                        ? `${step.targetCell[0]}${targetRowIndex + o}` 
                        : `${String.fromCharCode(step.targetCell[0].charCodeAt(0) + o)}${targetRowIndex}`;
                    this.scenographicMap[nextId] = "etiree";
                }
            }
        });

        this.initStep();
    }

    initStep() {
        document.getElementById('formula-bar').value = "";
        document.getElementById('formula-bar').disabled = false;
        document.getElementById('btn-validate').style.display = "block";
        document.getElementById('btn-giveup').style.display = "block";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('feedback').textContent = "";
        
        this.currentStepFormulas = {};
        this.stepStatus = "idle";

        const totalScenarios = this.scenarios.length;
        document.getElementById('step-label').textContent = `Tableau ${this.currentScenarioIndex + 1} / ${totalScenarios}`;
        document.getElementById('progress-fill').style.width = `${(this.currentScenarioIndex / totalScenarios) * 100}%`;

        const step = this.scenarios[this.currentScenarioIndex].steps[this.currentStepIndex];
        document.getElementById('consigne').innerHTML = `<strong>Mission :</strong> ${step.instruction}`;

        this.render();
        if (window.MathJax && typeof MathJax.typesetPromise === "function") { MathJax.typesetPromise(); }
        document.getElementById('formula-bar').focus();
    }

    render() {
        const sn = this.scenarios[this.currentScenarioIndex];
        const currentStep = sn.steps[this.currentStepIndex];
        const table = document.getElementById('sheet');
        table.innerHTML = "";

        const maxCols = sn.data[0].length;
        const hRow = document.createElement('tr');
        hRow.innerHTML = '<th class="label-cell"></th>';
        for (let i = 0; i < maxCols; i++) { hRow.innerHTML += `<th class="col-header">${String.fromCharCode(65 + i)}</th>`; }
        table.appendChild(hRow);

        sn.data.forEach((row, rIdx) => {
            const actualRow = rIdx + 1; 
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="label-cell">${actualRow}</td>`;

            row.forEach((rawStr, cIdx) => {
                const colLetter = String.fromCharCode(65 + cIdx);
                const cellId = `${colLetter}${actualRow}`;
                let td = document.createElement('td');
                
                const globalRole = this.scenographicMap[cellId];
                const isActiveInCurrentStep = (cellId === currentStep.targetCell || this.isCellInActiveSpread(cellId, currentStep, actualRow, cIdx));

                // --- GESTION DU FOND IMMUABLE + BORDURE DE VALIDATION ---
                if (globalRole === "cible") {
                    td.className = "cible";
                    if (this.validatedFormulas[cellId] && !isActiveInCurrentStep) {
                        td.className += " status-valide-precedent";
                    } else if (isActiveInCurrentStep) {
                        if (this.stepStatus === "success") td.className += " status-success";
                        if (this.stepStatus === "error") td.className += " status-error";
                    }
                    td.textContent = this.currentStepFormulas[cellId] ? this.getDisplay(cellId, this.currentStepFormulas[cellId]) : (this.validatedFormulas[cellId] ? this.getDisplay(cellId, this.validatedFormulas[cellId]) : (cellId === currentStep.targetCell ? "?" : ""));
                } 
                else if (globalRole === "etiree") {
                    td.className = "etiree";
                    if (this.validatedFormulas[cellId] && !isActiveInCurrentStep) {
                        td.className += " status-valide-precedent";
                    } else if (isActiveInCurrentStep) {
                        if (this.stepStatus === "success") td.className += " status-success";
                        if (this.stepStatus === "error") td.className += " status-error";
                    }
                    td.textContent = this.getDisplay(cellId, isActiveInCurrentStep ? this.currentStepFormulas[cellId] : this.validatedFormulas[cellId]);
                } 
                else {
                    const cellStr = String(rawStr);
                    if (cellStr.startsWith('&&')) {
                        td.className = "cell-text-bg";
                        td.innerHTML = `<div class="cell-text" style="font-weight: bold;">${cellStr.substring(2)}</div>`;
                    } 
                    else if (cellStr.startsWith('&')) {
                        td.className = "cell-text-bg";
                        td.innerHTML = `<div class="cell-text">${cellStr.substring(1)}</div>`;
                    } 
                    else if (cellStr.startsWith('!')) {
                        td.className = "cell-numeric-bg";
                        td.innerHTML = `<input type="text" class="editable-val" value="${this.currentContext[cellId]}" onchange="app.updateVal('${cellId}', this.value)">`;
                    } 
                    else {
                        td.style.border = "none";
                        td.style.backgroundColor = "transparent";
                    }
                }
                tr.appendChild(td);
            });
            table.appendChild(tr);
        });
    }

    isCellInActiveSpread(cellId, currentStep, actualRow, cIdx) {
        const offset = this.getOffset(cellId, currentStep.targetCell, currentStep.direction);
        if (currentStep.direction === "partout") {
            const targetColIndex = currentStep.targetCell[0].charCodeAt(0) - 65;
            const targetRowIndex = parseInt(currentStep.targetCell.substring(1));
            return (actualRow >= targetRowIndex && cIdx >= targetColIndex && cellId !== currentStep.targetCell);
        } 
        return (offset > 0 && offset <= currentStep.nbEtirements);
    }

    getOffset(id, target, dir) {
        const tC = target[0], tR = parseInt(target.substring(1));
        const cC = id[0], cR = parseInt(id.substring(1));
        if (dir === "bas" && cC === tC && cR > tR) return cR - tR;
        if (dir === "droite" && cR === tR && cC.charCodeAt(0) > tC.charCodeAt(0)) return cC.charCodeAt(0) - tC.charCodeAt(0);
        return 0;
    }

    propagate(f, offset, dir) {
        return f.replace(/(\$?)([A-Z]+)(\$?)([0-9]+)/g, (m, dC, col, dR, row) => {
            let r = parseInt(row), c = col.charCodeAt(0);
            if (dir === "bas" && dR !== "$") r += offset;
            if (dir === "droite" && dC !== "$") c += offset;
            return dC + String.fromCharCode(c) + dR + r;
        });
    }

    getDisplay(id, f) {
        if (!f) return "";
        if (this.viewMode === "formules") return f;
        try { 
            const resultatBrut = this.evaluate(f, this.currentContext); 
            return this.formaterNombre(resultatBrut);
        } catch { 
            return "#VALEUR!"; 
        }
    }

    updateVal(id, v) { this.currentContext[id] = v; this.render(); }
    toggleView() { this.viewMode = this.viewMode === "valeurs" ? "formules" : "valeurs"; this.render(); }
    formaterNombre(valeur) { const num = parseFloat(valeur); return isNaN(num) ? valeur : parseFloat(num.toFixed(10)); }

    giveUp() {
        this.currentScenarioIndex++;
        if (this.currentScenarioIndex < this.scenarios.length) { this.initScenario(); } 
        else {
            document.getElementById('quiz-ui').style.display = "none";
            document.getElementById('final-screen').style.display = "block";
            document.getElementById('progress-fill').style.width = "100%";
        }
    }

    checkAnswer() {
        let input = document.getElementById('formula-bar').value.trim().toUpperCase().replace(/\s/g, '');
        const sn = this.scenarios[this.currentScenarioIndex];
        const step = sn.steps[this.currentStepIndex];

        if (!input.startsWith("=")) { this.feedback("Erreur : Commencez par '='", "#d32f2f"); return; }

        this.currentStepFormulas = {};
        this.currentStepFormulas[step.targetCell] = input;
        const targetColIndex = step.targetCell[0].charCodeAt(0) - 65;
        const targetRowIndex = parseInt(step.targetCell.substring(1));

        if (step.direction === "partout") {
            for (let r = 1; r <= sn.data.length; r++) {
                for (let c = 0; c < sn.data[0].length; c++) {
                    if (r >= targetRowIndex && c >= targetColIndex) {
                        const currentId = `${String.fromCharCode(65 + c)}${r}`;
                        let propagated = this.propagate(input, c - targetColIndex, "droite");
                        propagated = this.propagate(propagated, r - targetRowIndex, "bas");
                        this.currentStepFormulas[currentId] = propagated;
                    }
                }
            }
        } else {
            for(let o = 1; o <= step.nbEtirements; o++) {
                const targetCol = step.targetCell[0];
                const targetRow = parseInt(step.targetCell.substring(1));
                const nextId = step.direction === "bas" ? `${targetCol}${targetRow + o}` : `${String.fromCharCode(targetCol.charCodeAt(0) + o)}${targetRow}`;
                this.currentStepFormulas[nextId] = this.propagate(input, o, step.direction);
            }
        }

        try {
            let passed = true;
            for (let i = 0; i < 3; i++) {
                const testCtx = i === 0 ? this.getCurrentNumericContext() : this.genRandomCtx();
                for (let cell in this.validatedFormulas) { testCtx[cell] = this.evaluate(this.validatedFormulas[cell], testCtx); }

                for (let cellId in this.currentStepFormulas) {
                    const userFormula = this.currentStepFormulas[cellId];
                    const cC = cellId[0].charCodeAt(0) - 65;
                    const cR = parseInt(cellId.substring(1));
                    let refFormulaProg = this.propagate(step.refFormula, cC - targetColIndex, "droite");
                    refFormulaProg = this.propagate(refFormulaProg, cR - targetRowIndex, "bas");

                    const userRes = this.evaluate(userFormula, testCtx);
                    const refRes = this.evaluate(refFormulaProg, testCtx);

                    if (Math.abs(userRes - refRes) > 0.00001) { passed = false; break; }
                }
                if (!passed) break;
            }

            if (passed) {
                this.stepStatus = "success";
                this.feedback("Formule correcte ! Les calculs et l'étirement sont parfaits.", "#2e7d32");
                document.getElementById('btn-validate').style.display = "none";
                document.getElementById('btn-giveup').style.display = "none";
                document.getElementById('btn-next').style.display = "block";
                document.getElementById('formula-bar').disabled = true;

                Object.assign(this.validatedFormulas, this.currentStepFormulas);
                for(let key in this.currentStepFormulas) { this.currentContext[key] = this.evaluate(this.currentStepFormulas[key], this.currentContext); }
            } else {
                this.stepStatus = "error";
                this.feedback("Formule incorrecte ou mauvaise gestion des dollars ($) lors de l'étirement global.", "#c62828");
            }
        } catch {
            this.stepStatus = "error";
            this.feedback("Formule appliquée, mais elle génère une erreur (#VALEUR!).", "#c62828");
        }
        this.render();
    }

    nextStep() {
        this.currentStepIndex++;
        const sn = this.scenarios[this.currentScenarioIndex];
        if (this.currentStepIndex < sn.steps.length) { this.initStep(); } 
        else {
            this.currentScenarioIndex++;
            if (this.currentScenarioIndex < this.scenarios.length) { this.initScenario(); } 
            else {
                document.getElementById('quiz-ui').style.display = "none";
                document.getElementById('final-screen').style.display = "block";
                document.getElementById('progress-fill').style.width = "100%";
            }
        }
    }

    getCellNumericValue(id, ctx) {
        let raw = String(ctx[id] || "0").trim();
        if (raw.endsWith('%')) {
            const num = parseFloat(raw.replace('%', ''));
            return isNaN(num) ? 0 : num / 100;
        }
        const num = parseFloat(raw);
        return isNaN(num) ? 0 : num;
    }

    evaluate(f, ctx) {
        let e = f.substring(1);
        e = e.replace(/([0-9.]+)\%/g, "($1/100)");

        const fn = (m, p) => {
            const cells = this.parseRange(p);
            const vals = cells.map(c => this.getCellNumericValue(c.replace(/\$/g,''), ctx));
            return m.includes("MOY") || m.includes("AVE") ? `(${vals.reduce((a,b)=>a+b,0)}/${vals.length})` : `(${vals.reduce((a,b)=>a+b,0)})`;
        };
        e = e.replace(/(?:MOYENNE|AVERAGE)\(([^)]+)\)/g, fn);
        e = e.replace(/(?:SOMME|SUM)\(([^)]+)\)/g, fn);
        e = e.replace(/\$?[A-Z]+\$?[0-9]+/g, m => {
            return this.getCellNumericValue(m.replace(/\$/g,''), ctx);
        });
        e = e.replace(/\^([0-9]+)/g, '**$1'); 
        return Function(`return (${e})`)();
    }

    parseRange(r) {
        const p = r.replace(/\$/g,'').split(':');
        if (p.length === 1) return [p[0]];
        const s = p[0], en = p[1];
        const cS = s.match(/[A-Z]+/)[0], rS = parseInt(s.match(/[0-9]+/)[0]);
        const cE = en.match(/[A-Z]+/)[0], rE = parseInt(en.match(/[0-9]+/)[0]);
        let res = [];
        for (let row = rS; row <= rE; row++) {
            for (let col = cS.charCodeAt(0); col <= cE.charCodeAt(0); col++) res.push(String.fromCharCode(col) + row);
        }
        return res;
    }

    getCurrentNumericContext() {
        let numericCtx = {};
        for (let key in this.currentContext) { numericCtx[key] = this.getCellNumericValue(key, this.currentContext); }
        return numericCtx;
    }

    genRandomCtx() {
        let c = {};
        for (let r = 1; r <= 15; r++) {
            for (let col = 0; col < 8; col++) c[`${String.fromCharCode(65 + col)}${r}`] = Math.floor(Math.random() * 20) + 1;
        }
        return c;
    }

    feedback(m, c) { const f = document.getElementById('feedback'); f.textContent = m; f.style.color = c; }
}

const app = new QuizApp([
    {
    data: [
        ["&&Rectangle", "&&Côté 1 (cm)", "&&Côté 2 (cm)", "&&Périmètre (cm)", "&&Aire (cm²)"], 
        ["&Valeurs",   "!5",            "!3",            "",                 ""]                            
    ],
    steps: [
        { instruction: "Étape 1 : Écrivez la formule pour calculer le <strong>Périmètre</strong> du rectangle en <strong>D2</strong> en utilisant les cellules <strong>B2</strong> et <strong>C2</strong>.", targetCell: "D2", refFormula: "=2*(B2+C2)", direction: "bas", nbEtirements: 0 },
        { instruction: "Étape 2 : Écrivez la formule pour calculer l'<strong>Aire</strong> du rectangle en <strong>E2</strong>.", targetCell: "E2", refFormula: "=B2*C2", direction: "bas", nbEtirements: 0 }
    ]
},
    {
        data: [
            ["&&Élève", "&&Note 1", "&&Note 2", "&&Note 3", "&&Moyenne"], 
            ["&Léa",     "!5",       "!4",       "!6",       ""],                                
            ["&Bob",     "!12",      "!14",      "!10",      ""],                            
            ["&Charlie", "!8",       "!9",       "!7",       ""]                            
        ],
        steps: [{ instruction: "Donnez la formule à taper en <strong>E2</strong> prête à être étirée vers le bas jusqu'en <strong>E4</strong>.", targetCell: "E2", refFormula: "=MOYENNE(B2:D2)", direction: "bas", nbEtirements: 2 }]
    },
    {
        data: [
            ["&&Article", "&&Prix Unit.", "&&Quantité", "&&Total"],     
            ["&Stylos",    "!1.5",         "!10",        ""],                            
            ["&Cahiers",   "!4",           "!5",         ""],                              
            ["&Gommes",    "!0.8",         "!20",        ""],                            
            ["",           "",             "&&Total à payer", ""]
