<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Le compte est bon — Retrouve l'expression</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<!-- Polices -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ardoise:      #1B2A22;
    --ardoise-2:    #233328;
    --craie:        #F4EFE3;
    --craie-douce:  #E8E2D2;
    --ocre:         #E8B14A;
    --ocre-vif:     #F2C868;
    --terracotta:   #D9684B;
    --sauge:        #7FA888;
    --sauge-vif:    #9AC2A4;
    --gris-brun:    #9C8F7A;
    --ombre:        rgba(0,0,0,.35);
    --rayon:        16px;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(255,255,255,.04), transparent 40%),
      var(--ardoise);
    color:var(--craie);
    font-family:"Space Grotesk", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:40px;
  }

  /* ===== Bandeau d'état ===== */
  #etat{
    width:100%;
    background:var(--ardoise-2);
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
  }
  #etat .titre-jeu{
    font-family:"Fraunces", serif;
    font-weight:700;
    font-size:1.15em;
    letter-spacing:.01em;
    color:var(--ocre-vif);
  }
  #etat .sep{
    width:1px;height:18px;background:rgba(255,255,255,.18);
  }
  #etat .info{
    font-size:.92em;
    color:var(--craie-douce);
    opacity:.9;
  }
  #etat .info strong{ color:var(--craie); font-weight:600; }

  .lien-fiche{
    background:transparent;
    border:1px solid rgba(255,255,255,.25);
    color:var(--craie-douce);
    font-family:"Space Grotesk", sans-serif;
    font-size:.85em;
    padding:5px 12px;
    border-radius:8px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }

  #selecteurNiveau{
    display:inline-flex;
    gap:4px;
    background:rgba(255,255,255,.06);
    border-radius:8px;
    padding:3px;
  }
  .niveau-btn{
    background:transparent;
    border:none;
    color:var(--craie-douce);
    font-family:"Space Grotesk", sans-serif;
    font-weight:600;
    font-size:.85em;
    padding:5px 12px;
    border-radius:6px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .niveau-btn:hover{ color:var(--ocre-vif); }
  .niveau-btn.actif{
    background:var(--ocre);
    color:var(--ardoise);
  }
  .niveau-btn.actif:hover{ color:var(--ardoise); }
  .lien-fiche:hover{ border-color:var(--ocre); color:var(--ocre-vif); }

  /* barre de progression */
  #progression{
    width:100%;
    max-width:520px;
    height:6px;
    background:rgba(255,255,255,.1);
    border-radius:6px;
    overflow:hidden;
    margin:10px auto 0;
  }
  #progressionBar{
    height:100%;
    background:linear-gradient(90deg, var(--sauge), var(--sauge-vif));
    border-radius:6px;
    transition:width .4s ease;
    width:0%;
  }

  /* ===== Consigne / cible ===== */
  #consigne-wrap{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:28px;
    padding:0 16px;
  }
  #consigne-label{
    font-size:.85em;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gris-brun);
    margin-bottom:10px;
  }
  #consigne{
    background:var(--ardoise-2);
    border:1px solid rgba(255,255,255,.08);
    padding:22px 36px;
    border-radius:var(--rayon);
    text-align:center;
    font-size:1.7em;
    box-shadow:0 8px 24px var(--ombre);
    position:relative;
    color:var(--craie);
  }
  #consigne::after{
    content:"";
    position:absolute;
    left:50%; bottom:-9px;
    transform:translateX(-50%);
    width:64px; height:3px;
    background:var(--ocre);
    border-radius:3px;
  }

  /* ===== Jetons ===== */
  #grille{
    display:flex;
    justify-content:center;
    gap:16px;
    margin:32px 16px 10px;
    flex-wrap:wrap;
  }
  .jeton{
    background:var(--craie);
    color:var(--ardoise);
    width:64px; height:64px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Fraunces", serif;
    font-weight:700;
    font-size:1.6em;
    box-shadow:0 4px 0 rgba(0,0,0,.25), 0 6px 14px var(--ombre);
    cursor:pointer;
    border:none;
    user-select:none;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .jeton:nth-child(1){ transform:rotate(-3deg); }
  .jeton:nth-child(2){ transform:rotate(2deg); }
  .jeton:nth-child(3){ transform:rotate(-1deg); }
  .jeton:hover{ transform:translateY(-3px) rotate(0deg); }
  .jeton:disabled:hover{ transform:none; }
  .jeton:active{ transform:translateY(1px); box-shadow:0 2px 0 rgba(0,0,0,.25), 0 3px 8px var(--ombre); }
  .jeton.utilise{ background:var(--ocre-vif); box-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 0 3px rgba(232,177,74,.4), 0 6px 14px var(--ombre); }
  .jeton.vert{ background:var(--sauge-vif) !important; }
  .jeton.faux{ background:var(--terracotta) !important; color:var(--craie); }
  .jeton:disabled{ cursor:default; }

  /* ===== Opérateurs rapides ===== */
  #operateurs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:6px 16px 4px;
    flex-wrap:wrap;
  }
  .op-btn{
    background:transparent;
    border:1.5px solid rgba(255,255,255,.2);
    color:var(--craie-douce);
    width:44px; height:44px;
    border-radius:10px;
    font-family:"Space Grotesk", sans-serif;
    font-size:1.2em;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease, background .15s ease;
  }
  .op-btn:hover{ border-color:var(--ocre); color:var(--ocre-vif); background:rgba(232,177,74,.08); }
  .op-btn:active{ transform:scale(.94); }

  /* ===== Panneau de saisie ===== */
  #panel{
    text-align:center;
    margin-top:18px;
    width:100%;
    max-width:520px;
    padding:0 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }
  #expr{
    font-family:"Space Grotesk", sans-serif;
    font-size:1.3em;
    padding:14px 16px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:2px solid rgba(255,255,255,.15);
    border-radius:12px;
    background:var(--craie);
    color:var(--ardoise);
    outline:none;
  }
  #expr:focus{
    border-color:var(--ocre);
    box-shadow:0 0 0 3px rgba(232,177,74,.25);
  }
  #expr:disabled{ opacity:.6; }

  .btn-row{
    display:flex;
    gap:12px;
    width:100%;
    max-width:420px;
  }
  button.action{
    flex:1;
    font-family:"Space Grotesk", sans-serif;
    font-weight:600;
    font-size:1.05em;
    padding:13px 18px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease;
  }
  button.action:active{ transform:translateY(1px); }
  #btnValider{ background:var(--ocre); color:var(--ardoise); }
  #btnValider:hover{ filter:brightness(1.08); }
  #btnNext{ background:var(--sauge); color:var(--ardoise); display:none; }
  #btnNext:hover{ filter:brightness(1.08); }

  /* ===== Debug ===== */
  #debugSolution{
    max-width:420px;
    margin:8px auto 0;
    padding:12px 16px;
    background:rgba(232,177,74,.1);
    border:1.5px dashed var(--ocre);
    border-radius:12px;
    display:none;
    text-align:center;
    color:var(--craie-douce);
  }
  #btnDebugNext{
    margin-top:8px;
    background:transparent;
    border:1px solid var(--ocre);
    color:var(--ocre-vif);
    border-radius:8px;
    padding:6px 14px;
    cursor:pointer;
  }

  /* ===== Message de retour ===== */
  #message{
    margin-top:22px;
    width:100%;
    max-width:560px;
    padding:0 16px;
    text-align:center;
    font-size:1.05em;
    color:var(--craie-douce);
    min-height:25px;
  }
  #message.ok{ color:var(--sauge-vif); }
  #message.erreur{ color:var(--terracotta); }
  #message .detail{
    display:block;
    margin-top:6px;
    font-size:.92em;
    color:var(--gris-brun);
  }
  #message mjx-container{ color:var(--craie) !important; }

  /* ===== Écran de fin ===== */
  #ecranFin{
    background:var(--ardoise-2);
    border:1px solid rgba(255,255,255,.08);
    border-radius:var(--rayon);
    padding:32px 40px;
    text-align:center;
    box-shadow:0 8px 24px var(--ombre);
    max-width:420px;
    margin:0 16px;
  }
  #ecranFin .score-final{
    font-family:"Fraunces", serif;
    font-weight:700;
    font-size:2.4em;
    color:var(--ocre-vif);
  }
  #ecranFin .pct{ color:var(--gris-brun); margin-top:4px; }
  #ecranFin .commentaire{ margin-top:14px; font-size:1.15em; }
  #ecranFin .action{ margin-top:22px; max-width:200px; }

  @media (max-width:480px){
    #etat{ font-size:.95em; gap:10px; }
    #consigne{ font-size:1.35em; padding:18px 22px; }
    .jeton{ width:56px; height:56px; font-size:1.4em; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  /* ===== Overlay Fiche papier ===== */
  #overlayFiche{
    display:none;
    position:fixed;
    top:0; right:0; bottom:0; left:0;
    background:rgba(0,0,0,.55);
    z-index:1000;
    align-items:flex-start;
    justify-content:center;
    overflow-y:auto;
    padding:24px 16px;
  }
  #overlayFiche.ouvert{ display:flex; }

  #ficheCarte{
    background:#fff;
    color:#1a1a1a;
    width:100%;
    max-width:760px;
    border-radius:14px;
    padding:52px 32px 28px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
    position:relative;
  }

  #btnFermerFiche{
    position:absolute;
    top:16px; right:16px;
    width:32px;
    height:32px;
    background:transparent;
    border:none;
    font-size:1.4em;
    color:#888;
    cursor:pointer;
    line-height:1;
  }
  #btnFermerFiche:hover{ color:#333; }

  #ficheCarte h2{
    font-family:"Fraunces", serif;
    color:var(--ardoise);
    margin:0 0 4px;
  }
  #ficheCarte .sous-titre{
    color:#6B6155;
    margin:0 0 18px;
    font-size:.95em;
  }

  .fiche-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .fiche-actions button{
    font-family:"Space Grotesk", sans-serif;
    font-weight:600;
    font-size:.95em;
    padding:10px 16px;
    border-radius:10px;
    border:none;
    cursor:pointer;
  }
  #btnTelechargerTex{ background:#2A3B30; color:#F4EFE3; }
  #btnTelechargerTex:hover{ filter:brightness(1.15); }
  #btnImprimerFiche{ background:var(--ocre); color:#1a1a1a; }
  #btnImprimerFiche:hover{ filter:brightness(1.08); }
  #btnRegenererFiche{ background:transparent; border:1.5px solid #ccc; color:#555; }
  #btnRegenererFiche:hover{ border-color:#999; }

  .note-impression{
    font-size:.82em;
    color:#8a7f6e;
    margin:-6px 0 18px;
  }

  .ligne-identite{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:24px;
    font-size:.95em;
    color:#3a352c;
  }
  .ligne-identite .trait{
    display:inline-block;
    border-bottom:1px solid #999;
    min-width:220px;
    margin-left:6px;
  }
  .ligne-identite .trait.court{
    min-width:70px;
  }

  /* Marge verticale entre les grands blocs de la fiche (identité / titre / tableau) */
  .espace-fiche{
    height:28px;
  }

  #ficheTableWrap table{
    width:100%;
    border-collapse:collapse;
    font-size:.95em;
    table-layout:fixed;
    border:2px solid #1a1a1a;
  }
  #ficheTableWrap th, #ficheTableWrap td{
    border:1px solid #999;
    padding:14px 10px;
    text-align:center;
    overflow:hidden;
    height:70px;   /* hauteur fixe : uniformise les lignes avec fraction (2 niveaux) et sans */
    box-sizing:border-box;
  }
  #ficheTableWrap th{ background:#f3f1ec; }

  /* Colonne N° : discrète, juste un repère de ligne, pas une donnée d'exercice */
#ficheTableWrap th:first-child,
  #ficheTableWrap td:first-child{
    background:#e9e6df;
    color:#1a1a1a;
    font-size:.85em;
    border-right:3px double #1a1a1a;
  }

  /* Double filet avant la colonne Cible : sépare "jetons fournis" du "résultat à atteindre" */
  /* Note : dans le <thead>, "Cible" est le 3e <th> réel (N° / Jetons[colspan3] / Cible / Expression) */
  #ficheTableWrap thead th:nth-child(3),
  #ficheTableWrap tbody td:nth-child(5){
    border-left:3px double #1a1a1a;
  }

  /* Double filet avant la colonne Expression : c'est la zone où l'élève écrit */
  #ficheTableWrap td.col-expression,
  #ficheTableWrap th:last-child{
    border-left:3px double #1a1a1a;
  }

  #ficheTableWrap td.col-expression{ color:#aaa; }
  /* La largeur de chaque colonne se règle dans le <colgroup>, voir le
     commentaire "MODIFIER ICI" dans la fonction rendreTableauFiche() (JS). */

  /* ---- Fraction en CSS pur (sans MathJax), fiable à l'impression ---- */
  .frac{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    vertical-align:middle;
    font-size:.92em;
    line-height:1.1;
  }
  .frac .num{
    border-bottom:1.3px solid #1a1a1a;
    padding:0 4px 1px;
  }
  .frac .den{
    padding:1px 4px 0;
  }
  .nb{ vertical-align:middle; }

  /* ===== Impression : on n'imprime QUE la fiche ===== */
  @media print{
    @page{ margin: 1.2cm; }

    /* Sans ça, les navigateurs désactivent par défaut les couleurs de fond
       et atténuent certaines bordures à l'impression pour économiser l'encre. */
    *{
      print-color-adjust:exact !important;
      -webkit-print-color-adjust:exact !important;
    }

    html, body{
      background:#fff !important;
      margin:0;
      padding:0;
    }

    /* On masque PHYSIQUEMENT tout le reste de la page (le jeu en dessous) */
    body > *:not(#overlayFiche){
      display:none !important;
    }

    #overlayFiche{
      display:block !important;
      position:static !important;
      background:none !important;
      padding:0 !important;
      margin:0 !important;
      overflow:visible !important;
    }

    #ficheCarte{
      position:static !important;
      width:100% !important;
      max-width:none !important;
      box-shadow:none !important;
      border-radius:0 !important;
      padding:0 !important;
      margin:0 !important;
      background:#fff !important;
      color:#1a1a1a !important;
    }

    #btnFermerFiche, .fiche-actions, .note-impression{ display:none !important; }

    #ficheCarte h2{ font-size:1.3em; margin-bottom:2px; }
    #ficheCarte .sous-titre{ display:none; }
  }
</style>
</head>

<body>

<div id="etat">
  <span class="titre-jeu">Le compte est bon</span>
  <span class="sep"></span>
  <div id="selecteurNiveau" role="group" aria-label="Choix du niveau">
    <button type="button" class="niveau-btn" data-niveau="6">6e</button>
    <button type="button" class="niveau-btn" data-niveau="5">5e</button>
    <button type="button" class="niveau-btn" data-niveau="4">4e</button>
  </div>
  <span class="sep"></span>
  <span class="info" id="infoTexte"></span>
  <span class="sep"></span>
  <button id="btnFichePapier" type="button" class="lien-fiche">📄 Fiche papier</button>
</div>
<div id="progression"><div id="progressionBar"></div></div>

<div id="consigne-wrap">
  <div id="consigne-label">Trouve une expression qui donne</div>
  <div id="consigne"></div>
</div>

<div id="grille"></div>

<div id="operateurs">
  <button class="op-btn" data-op="+" type="button" aria-label="Insérer un plus">+</button>
  <button class="op-btn" data-op="-" type="button" aria-label="Insérer un moins">−</button>
  <button class="op-btn" data-op="*" type="button" aria-label="Insérer une multiplication">×</button>
  <button class="op-btn" data-op=":" type="button" aria-label="Insérer une division">÷</button>
  <button class="op-btn" data-op="(" type="button" aria-label="Insérer une parenthèse ouvrante">(</button>
  <button class="op-btn" data-op=")" type="button" aria-label="Insérer une parenthèse fermante">)</button>
  <button class="op-btn" type="button" id="btnEffacer" aria-label="Effacer le dernier caractère">⌫</button>
</div>

<div id="panel">
  <input
    id="expr"
    placeholder="Ex : (3×9)÷7"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    inputmode="text"
  />

  <div class="btn-row">
    <button class="action" id="btnValider" type="button">Valider</button>
    <button class="action" id="btnNext" type="button">Question suivante</button>
  </div>

  <div id="debugSolution">
    <div id="solutionTexte"></div>
    <button id="btnDebugNext" type="button">Suivant (test)</button>
  </div>
</div>

<div id="message"></div>

<div id="zoneFin" style="display:none;width:100%;justify-content:center;margin-top:20px;">
  <div id="ecranFin"></div>
</div>

<!-- ==================== OVERLAY FICHE PAPIER ==================== -->
<div id="overlayFiche">
  <div id="ficheCarte">
    <button id="btnFermerFiche" type="button" aria-label="Fermer">×</button>

    <div class="fiche-actions">
      <button id="btnImprimerFiche" type="button">🖨️ Imprimer en PDF</button>
      <button id="btnTelechargerTex" type="button">⬇️ Télécharger le LaTeX</button>
      <button id="btnRegenererFiche" type="button">🔀 Nouvelle série</button>
    </div>
    <p class="note-impression">💡 Dans la fenêtre d'impression, pense à décocher <strong>« En-têtes et pieds de page »</strong> pour un rendu propre sans l'adresse du fichier.</p>

    <div class="espace-fiche"></div>

    <div class="ligne-identite">
      <span>Nom et prénom : <span class="trait"></span></span>
      <span>Note : <span class="trait court"></span> / 20</span>
    </div>

    <div class="espace-fiche"></div>

    <h2>Le compte est bon</h2>
    <p class="sous-titre"></p>

    <div class="espace-fiche"></div>

    <div id="ficheTableWrap"></div>
  </div>
</div>

<!-- ==================== FRACTION ==================== -->
<script src="Fraction.js"></script>

<!-- ==================== SCRIPT PRINCIPAL ==================== -->
<script>

// ==================== NIVEAU ====================
const DEBUG = true;

let niveau = new Niveau6(); // changeable via le sélecteur 6e/5e dans le bandeau

const OPS = ["+","-","*",":"];

const NB_QUESTIONS = 10;

let questionIndex = 0; // commence à 0
let score = 0;

// Génère un entier de 1 à 9. N'est plus utilisée pour les jetons de départ
// (voir niveau.genererJeton(), qui décide aussi du signe selon le niveau) ;
// conservée pour compatibilité si réutilisée ailleurs.
function rand(){
  return Math.floor(Math.random()*9)+1;
}

// ==================== CALCUL FRACTION ====================
function applyOp(a, op, b){
  switch(op){
    case "+": return new Fraction(
      a.nb*b.db + b.nb*a.db,
      a.db*b.db
    );
    case "-": return new Fraction(
      a.nb*b.db - b.nb*a.db,
      a.db*b.db
    );
    case "*": return new Fraction(
      a.nb*b.nb,
      a.db*b.db
    );
    case ":":
      if(b.nb === 0) return null;

      const num = a.nb * b.db;
      const den = a.db * b.nb;

      const res = new Fraction(num, den);

      // on garde la forme NON simplifiée
      res.raw = { n: num, d: den };

      return res;
  }
}

// ==================== PARSER STRICT ====================
// Tokenizer + parser récursif descendant (grammaire à 2 niveaux de priorité :
// */: avant +/-), avec gestion des nombres relatifs (jetons négatifs en 5e).
//
// Règle de désambiguïsation du signe '-' : il n'est interprété comme signe
// d'un nombre négatif QUE s'il est en tout début d'expression ou juste après
// une parenthèse ouvrante '('. Partout ailleurs (juste après un opérateur,
// y compris un autre '-'), deux symboles collés sont une erreur de structure
// — donc "8+-3" est invalide, il faut écrire "8+(-3)".
//
// Remplace l'ancienne version à 3 formes rigides (regex figées sur 2
// opérations) : celle-ci accepte plus de structures valides (ex: "8*9*7"
// sans parenthèses) tout en gérant le signe, sans dupliquer de regex.

function tokenizeExpression(expr){
  const tokens = [];
  let i = 0;
  const n = expr.length;

  while(i < n){
    const c = expr[i];

    if(c === "(" || c === ")"){
      tokens.push({ type: c === "(" ? "LPAREN" : "RPAREN", value: c });
      i++;
      continue;
    }

    if("+-*:".includes(c)){
      const precedent = tokens[tokens.length - 1];
      const estDebutOperande = !precedent || precedent.type === "LPAREN" || precedent.type === "OP";

      if(c === "-" && estDebutOperande){
        // Un '-' juste après un autre opérateur (même un autre '-') n'est
        // jamais traité comme un signe : c'est une erreur de structure.
        if(precedent && precedent.type === "OP"){
          return { erreur: "signe_apres_operateur" };
        }
        let j = i + 1;
        if(j < n && /\d/.test(expr[j])){
          let num = "-";
          while(j < n && /\d/.test(expr[j])){ num += expr[j]; j++; }
          tokens.push({ type: "NUM", value: num });
          i = j;
          continue;
        }
        return { erreur: "signe_sans_chiffre" };
      }

      if(precedent && precedent.type === "OP"){
        return { erreur: "deux_operateurs_consecutifs" };
      }
      tokens.push({ type: "OP", value: c });
      i++;
      continue;
    }

    if(/\d/.test(c)){
      let num = "";
      let j = i;
      while(j < n && /\d/.test(expr[j])){ num += expr[j]; j++; }
      tokens.push({ type: "NUM", value: num });
      i = j;
      continue;
    }

    return { erreur: "caractere_invalide" };
  }

  return { tokens };
}

function construireArbreExpression(tokens){
  let pos = 0;
  const peek = () => tokens[pos];
  const avance = () => tokens[pos++];

  // additif := multiplicatif (('+'|'-') multiplicatif)*
  function parseAdditif(){
    let gauche = parseMultiplicatif();
    if(gauche.erreur) return gauche;
    while(peek() && peek().type === "OP" && (peek().value === "+" || peek().value === "-")){
      const op = avance().value;
      const droite = parseMultiplicatif();
      if(droite.erreur) return droite;
      gauche = { type: "BINOP", op, gauche, droite };
    }
    return gauche;
  }

  // multiplicatif := facteur (('*'|':') facteur)*
  function parseMultiplicatif(){
    let gauche = parseFacteur();
    if(gauche.erreur) return gauche;
    while(peek() && peek().type === "OP" && (peek().value === "*" || peek().value === ":")){
      const op = avance().value;
      const droite = parseFacteur();
      if(droite.erreur) return droite;
      gauche = { type: "BINOP", op, gauche, droite };
    }
    return gauche;
  }

  // facteur := NUM | '(' additif ')'
  function parseFacteur(){
    const t = peek();
    if(!t) return { erreur: "expression_incomplete" };
    if(t.type === "NUM"){ avance(); return { type: "NUM", value: t.value }; }
    if(t.type === "LPAREN"){
      avance();
      const inner = parseAdditif();
      if(inner.erreur) return inner;
      if(!peek() || peek().type !== "RPAREN") return { erreur: "parenthese_fermante_manquante" };
      avance();
      return inner;
    }
    return { erreur: "facteur_attendu" };
  }

  const arbre = parseAdditif();
  if(arbre.erreur) return arbre;
  if(pos !== tokens.length) return { erreur: "tokens_restants" };
  return { arbre };
}

function compterNombresArbre(noeud){
  if(noeud.type === "NUM") return 1;
  return compterNombresArbre(noeud.gauche) + compterNombresArbre(noeud.droite);
}

function compterOperationsArbre(noeud){
  if(noeud.type === "NUM") return 0;
  return 1 + compterOperationsArbre(noeud.gauche) + compterOperationsArbre(noeud.droite);
}

function extraireNombresArbre(noeud, acc = []){
  if(noeud.type === "NUM"){ acc.push(noeud.value); return acc; }
  extraireNombresArbre(noeud.gauche, acc);
  extraireNombresArbre(noeud.droite, acc);
  return acc;
}

function evaluerArbreExpression(noeud){
  if(noeud.type === "NUM"){
    return { resultat: new Fraction(+noeud.value, 1), steps: [] };
  }
  const g = evaluerArbreExpression(noeud.gauche);
  if(!g) return null;
  const d = evaluerArbreExpression(noeud.droite);
  if(!d) return null;

  const r = applyOp(g.resultat, noeud.op, d.resultat);
  if(!r) return null;

  const steps = [...g.steps, ...d.steps, { gauche: g.resultat, op: noeud.op, droite: d.resultat, resultat: r }];
  return { resultat: r, steps };
}

// Reconstruit le LaTeX de l'expression de départ depuis l'arbre, en
// ajoutant des parenthèses uniquement quand la priorité l'exige (comme une
// expression mathématique normale) ET autour d'un nombre négatif qui
// n'est pas en toute première position (lisibilité : "8+(-3)", pas "8+-3").
function arbreVersLatex(noeud, prioriteParent, estEnTete){
  if(noeud.type === "NUM"){
    const estNegatif = noeud.value.startsWith("-");
    return (estNegatif && !estEnTete) ? `(${noeud.value})` : noeud.value;
  }
  const prio = (noeud.op === "*" || noeud.op === ":") ? 2 : 1;
  const txtGauche = arbreVersLatex(noeud.gauche, prio, estEnTete);
  const txtDroite = arbreVersLatex(noeud.droite, prio + 1, false);
  const txt = `${txtGauche}${latexOp(noeud.op)}${txtDroite}`;
  return prioriteParent > prio ? `(${txt})` : txt;
}

function parseExpressionStrict(expr, jetons){
  expr = expr.replace(/\s+/g, "");
  if(expr === "") return null;

  const lex = tokenizeExpression(expr);
  if(lex.erreur) return null;

  const parsed = construireArbreExpression(lex.tokens);
  if(parsed.erreur) return null;

  const nbNombres = compterNombresArbre(parsed.arbre);
  const nbOperations = compterOperationsArbre(parsed.arbre);
  if(nbNombres !== 3 || nbOperations !== 2) return null;

  const numsDisponibles = jetons.map(j => j.nb.toString());
  const numsUtilises = extraireNombresArbre(parsed.arbre);
  if(!checkJetons(numsUtilises, numsDisponibles)) return null;

  const evalu = evaluerArbreExpression(parsed.arbre);
  if(!evalu) return null;

  return {
    resultat: evalu.resultat,
    steps: evalu.steps,
    initialLatex: arbreVersLatex(parsed.arbre, 0, true)
  };
}


// ==================== JETONS ====================

// Extrait la liste des nombres "tels qu'écrits" dans l'expression, en
// reconnaissant un nombre négatif (signe collé) UNIQUEMENT quand ce signe
// est en position valide (début de chaîne ou juste après '(') — la même
// règle de désambiguïsation que le parser. Ne valide pas la structure
// globale (ça reste le rôle de parseExpressionStrict) : cette fonction sert
// au feedback visuel temps réel des jetons et à leur vérification basique.
function extractNumbers(expr){
  const numbers = [];
  let i = 0;
  const n = expr.length;
  let positionValidePourSigne = true; // début de chaîne = position valide

  while(i < n){
    const c = expr[i];

    if(c === "("){
      positionValidePourSigne = true;
      i++;
      continue;
    }
    if(c === ")"){
      positionValidePourSigne = false;
      i++;
      continue;
    }
    if("+-*:".includes(c)){
      if(c === "-" && positionValidePourSigne && /\d/.test(expr[i+1] || "")){
        let j = i + 1;
        let num = "-";
        while(j < n && /\d/.test(expr[j])){ num += expr[j]; j++; }
        numbers.push(num);
        i = j;
        positionValidePourSigne = false;
        continue;
      }
      positionValidePourSigne = true;
      i++;
      continue;
    }
    if(/\d/.test(c)){
      let num = "";
      let j = i;
      while(j < n && /\d/.test(expr[j])){ num += expr[j]; j++; }
      numbers.push(num);
      i = j;
      positionValidePourSigne = false;
      continue;
    }
    i++;
  }

  return numbers;
}

function countOccurrences(arr){
  const c = {};
  arr.forEach(x => c[x] = (c[x] || 0) + 1);
  return c;
}

function sameJetons(used, available){
  return used.slice().sort().join(",") ===
         available.slice().sort().join(",");
}

function feedbackJetons(expr){
  const used = extractNumbers(expr);
  const restant = countOccurrences(used);

  document.querySelectorAll(".jeton").forEach(j=>{
    const n = j.textContent;
    if(restant[n] && restant[n] > 0){
      j.classList.add("utilise");
      restant[n]--;
    } else {
      j.classList.remove("utilise");
    }
  });
}

function checkJetons(used, available){
  return used.slice().sort().join(",") ===
         available.slice().sort().join(",");
}

function contexte(op, gauche, droite){
  return {
    op,
    gauche:{
      valeur: gauche.nb / gauche.db,
      type: (gauche.db === 1 ? "entier" : "fraction")
    },
    droite:{
      valeur: droite.nb / droite.db,
      type: (droite.db === 1 ? "entier" : "fraction")
    }
  };
}

// ==================== GÉNÉRATION ====================
// ==================== CLASSES DE RÉSULTATS ====================

function classeFraction(f){
  if(f.isEntier()) return "entier";

  if(f.estDecimaleExacte()) return "decimal";

  if(Math.abs(f.n) < Math.abs(f.d)) return "fraction_simple";

  return "mixte";
}

// Formate un jeton numérique pour l'insérer dans une expression texte,
// en l'entourant de parenthèses s'il est négatif et qu'il n'est PAS en tête
// (immédiatement après un opérateur, un négatif collé donnerait "8+-3", une
// séquence que le parser rejette explicitement). Utilisé à la fois pour les
// solutions générées par generate() et pour l'insertion par clic sur jeton
// (voir inserer()), afin de ne pas dupliquer cette règle à deux endroits.
function formaterJetonExpr(valeur, estEnTete){
  return (valeur < 0 && !estEnTete) ? `(${valeur})` : `${valeur}`;
}

function generate(){

  while(true){

    const a = new Fraction(niveau.genererJeton(),1);
    const b = new Fraction(niveau.genererJeton(),1);
    const c = new Fraction(niveau.genererJeton(),1);

    const valeurs = [a,b,c];

    const resultatsParClasse = {
      entier: [],
      fraction_simple: [],
      decimal: [],
      mixte: []
    };

    const perms = [
      [valeurs[0],valeurs[1],valeurs[2]],
      [valeurs[0],valeurs[2],valeurs[1]],
      [valeurs[1],valeurs[0],valeurs[2]],
      [valeurs[1],valeurs[2],valeurs[0]],
      [valeurs[2],valeurs[0],valeurs[1]],
      [valeurs[2],valeurs[1],valeurs[0]],
    ];

    for(const [x,y,z] of perms){
      for(const op1 of OPS){
        for(const op2 of OPS){

          // (x op1 y) op2 z
          if(niveau.autoriseOperation(contexte(op1,x,y))){
            const r1 = applyOp(x,op1,y);
            if(r1 && niveau.autoriseOperation(contexte(op2,r1,z))){
              const r2 = applyOp(r1,op2,z);
              if(r2){
                const cl = classeFraction(r2);
                // x est en tête de la sous-expression "(x op1 y)" : pas de
                // parenthèse supplémentaire nécessaire même si négatif. y et z
                // suivent toujours un opérateur : parenthéser si négatifs,
                // sinon "(8+-3)" serait généré et rejeté par le parser lui-même.
                resultatsParClasse[cl].push({
                  resultat: r2,
                  expr: `(${formaterJetonExpr(x.nb,true)}${op1}${formaterJetonExpr(y.nb,false)})${op2}${formaterJetonExpr(z.nb,false)}`
                });
              }
            }
          }

          // x op1 (y op2 z)
          if(niveau.autoriseOperation(contexte(op2,y,z))){
            const r1 = applyOp(y,op2,z);
            if(r1 && niveau.autoriseOperation(contexte(op1,x,r1))){
              const r2 = applyOp(x,op1,r1);
              if(r2){
                const cl = classeFraction(r2);
                // x est en tête de l'expression entière ; y est en tête de la
                // sous-expression "(y op2 z)" (juste après la parenthèse
                // ouvrante) ; z suit toujours un opérateur.
                resultatsParClasse[cl].push({
                  resultat: r2,
                  expr: `${formaterJetonExpr(x.nb,true)}${op1}(${formaterJetonExpr(y.nb,true)}${op2}${formaterJetonExpr(z.nb,false)})`
                });
              }
            }
          }

        }
      }
    }

    // déduplication mathématique
    for(const cl in resultatsParClasse){
      const uniques = [];
      resultatsParClasse[cl].forEach(obj=>{
        if(!uniques.some(u => u.resultat.equals(obj.resultat))){
          uniques.push(obj);
        }
      });
      resultatsParClasse[cl] = uniques;
    }

    // on exige au moins une fraction possible
    if(
      resultatsParClasse.fraction_simple.length === 0 &&
      resultatsParClasse.mixte.length === 0
    ){
      continue;
    }

    return { a, b, c, resultatsParClasse };
  }
}



// ==================== LATEX ====================
function latexOp(op){
  return op==="*"?"\\times":op;
}

function buildExpressionLatex(gauche, op, droite){
  const g = (typeof gauche==="string") ? gauche : gauche.toLatex();
  const d = (typeof droite==="string") ? droite : droite.toLatex();
  return `${g} ${latexOp(op)} ${d}`;
}

function estAtome(expr){

  // entier ou décimal (ex : 6, -3, 2,5)
  if(/^-?\d+(,\d+)?$/.test(expr)) return true;

  // fraction seule (ex : \dfrac{2}{3})
  if(/^\\dfrac{\d+}{\d+}$/.test(expr)) return true;

  return false;
}

function latexSteps(parsed, statutFinalImpose){

  const steps = parsed.steps;
  let lines = [];

  let currentLatex = parsed.initialLatex;
  lines.push(currentLatex);

  steps.forEach((s, i) => {

    let resLatex;

    // =========================
    // CAS DIVISION → fraction brute
    // =========================
    if(s.op === ":" && s.resultat.raw){

      const brute = `\\dfrac{${s.resultat.raw.n}}{${s.resultat.raw.d}}`;
      const simplifie = s.resultat.toLatex();

      const gauche = s.gauche.toLatex();
      const droite = s.droite.toLatex();
      const operation = `${gauche}${latexOp(s.op)}${droite}`;

      // étape 1 : remplacer par fraction brute
      currentLatex = currentLatex.replace(operation, brute);
      lines.push(currentLatex);

      // étape 2 : simplification SI différente
      if(brute !== simplifie){

        const newLatex = currentLatex.replace(brute, simplifie);

        // évite les doublons
        if(newLatex !== currentLatex){
          currentLatex = newLatex;
          lines.push(currentLatex);
        }
      }

      return;
    }

    // =========================
    // CAS NORMAL
    // =========================
    if(i === steps.length - 1){
      resLatex = s.resultat.toLatex(statutFinalImpose);
    } else {
      resLatex = s.resultat.toLatex();

      if(!estAtome(resLatex)){
        resLatex = `\\big(${resLatex}\\big)`;
      }
    }

    const next = steps[i+1];

    if(next && next.gauche === s.resultat){
      currentLatex = `${resLatex}${latexOp(next.op)}${next.droite.toLatex()}`;
    } else if(next){
      currentLatex = `${next.gauche.toLatex()}${latexOp(next.op)}${resLatex}`;
    } else {
      currentLatex = resLatex;
    }

    lines.push(currentLatex);
  });

  return `
\\[
\\begin{array}{l}
&${lines[0]} \\\\
${lines.slice(1).map(l=>`=& ${l}`).join(" \\\\ ")}
\\end{array}
\\]
`;
}

let game, phase="saisie";

// ==================== ÉQUILIBRAGE DU QUIZ ====================

const frequencesCibles = {
  entier: 0.30,
  fraction_simple: 0.30,
  decimal: 0.20,
  mixte: 0.20
};

const statsQuiz = {
  entier: 0,
  fraction_simple: 0,
  decimal: 0,
  mixte: 0
};

function choisirClasse(resultatsParClasse){

  const total = questionIndex || 1;

  const classesPossibles =
    Object.keys(resultatsParClasse)
      .filter(c => resultatsParClasse[c].length > 0);

  const etats = classesPossibles.map(c => ({
    classe: c,
    retard: (statsQuiz[c] / total) - frequencesCibles[c]
  }));

  etats.sort((a,b) => a.retard - b.retard);

  return etats[0].classe;
}

// ==================== RÉFÉRENCES DOM ====================
const etat = document.getElementById("infoTexte");
const consigne = document.getElementById("consigne");
const grille = document.getElementById("grille");
const expr = document.getElementById("expr");
const btnValider = document.getElementById("btnValider");
const btnNext = document.getElementById("btnNext");
const message = document.getElementById("message");
const progressionBar = document.getElementById("progressionBar");
const panel = document.getElementById("panel");
const operateursZone = document.getElementById("operateurs");
const zoneFin = document.getElementById("zoneFin");
const ecranFin = document.getElementById("ecranFin");
const consigneWrap = document.getElementById("consigne-wrap");

function majBandeau(){
  progressionBar.style.width = (100 * (questionIndex - 1) / NB_QUESTIONS) + "%";
  etat.innerHTML =
    `Question <strong>${questionIndex}</strong>/${NB_QUESTIONS}` +
    ` · Score <strong>${score}</strong>/${questionIndex - 1}`;
}

function nouvellePartie(){

  if(questionIndex >= NB_QUESTIONS){
    phase = "fin";

    progressionBar.style.width = "100%";

    const pourcentage = Math.round(100 * score / NB_QUESTIONS);

    let commentaire;

    if(pourcentage === 100){
      commentaire = "Parfait ! Toutes les expressions sont justes. 🎯";
    }
    else if(pourcentage >= 80){
      commentaire = "Très bon travail, tu maîtrises bien ! 👍";
    }
    else if(pourcentage >= 60){
      commentaire = "C'est correct, encore un peu d'entraînement et ce sera parfait. 🙂";
    }
    else{
      commentaire = "Pas de souci, recommence : c'est en s'entraînant qu'on progresse. 💪";
    }

    etat.innerHTML = "Quiz terminé";

    consigneWrap.style.display = "none";
    grille.innerHTML = "";
    operateursZone.style.display = "none";
    panel.style.display = "none";
    message.textContent = "";
    message.className = "";

    ecranFin.innerHTML = `
      <div class="score-final">${score} / ${NB_QUESTIONS}</div>
      <div class="pct">${pourcentage} %</div>
      <div class="commentaire">${commentaire}</div>
    `;

    const btnRejouer = document.createElement("button");
    btnRejouer.type = "button";
    btnRejouer.className = "action";
    btnRejouer.textContent = "Rejouer";
    btnRejouer.onclick = relancer;
    ecranFin.appendChild(btnRejouer);

    zoneFin.style.display = "flex";

    return;
  }

  consigneWrap.style.display = "flex";
  operateursZone.style.display = "flex";
  panel.style.display = "flex";
  zoneFin.style.display = "none";
  ecranFin.innerHTML = "";
  expr.style.display = "inline-block";

  questionIndex++;

  game = generate();

  const classeCible = choisirClasse(game.resultatsParClasse);
  const candidats = game.resultatsParClasse[classeCible];
  const sol = candidats[Math.random()*candidats.length|0];

  game.target = sol.resultat;
  game.solutionExpr = sol.expr;
  game.classe = classeCible;

  statsQuiz[game.classe]++;

  phase = "saisie";

  majBandeau();

  consigne.innerHTML =
    "\\(" + game.target.toLatex(game.target.statut) + "\\)";

  MathJax.typesetPromise([consigne]);

  grille.innerHTML="";
  pileInsertions = [];
  [game.a, game.b, game.c]
    .map(f => f.nb.toString())
    .sort(()=>Math.random()-0.5)
    .forEach((n, idx)=>{
      const d = document.createElement("button");
      d.type = "button";
      d.className = "jeton";
      d.textContent = n;
      d.dataset.jetonId = idx;
      d.setAttribute("aria-label", "Insérer le nombre " + n);
      d.onclick = () => inserer(n, d);
      grille.appendChild(d);
    });

  expr.value = "";
  expr.disabled = false;
  btnValider.style.display = "inline-block";
  btnNext.style.display = "none";
  message.textContent = "";
  message.className = "";
  expr.focus();

  const debug = document.getElementById("debugSolution");
  const solTxt = document.getElementById("solutionTexte");

  solTxt.innerHTML =
    "Solution possible : \\(" +
    game.solutionExpr.replace(/\*/g,"\\times").replace(/:/g,"\\div") +
    "\\)";

  debug.style.display = DEBUG ? "block" : "none";
  if(DEBUG) MathJax.typesetPromise([debug]);
}

function relancer(){
  questionIndex = 0;
  score = 0;
  for(const k in statsQuiz){
    statsQuiz[k] = 0;
  }
  nouvellePartie();
}

// niveau (3e, etc.) revient à ajouter une entrée ici + un bouton dans le HTML.
const NIVEAUX_DISPONIBLES = {
  "6": Niveau6,
  "5": Niveau5,
  "4": Niveau4,
};

function choisirNiveau(code){
  const ClasseNiveau = NIVEAUX_DISPONIBLES[code] || Niveau6;

  document.querySelectorAll(".niveau-btn").forEach(btn=>{
    btn.classList.toggle("actif", btn.dataset.niveau === code);
  });

  relancer();
}

// ==================== INSERTION JETONS / OPÉRATEURS ====================
// Pile qui mémorise, pour chaque caractère inséré via un clic sur un jeton,
// quel élément jeton précis a servi (permet de gérer les doublons : si deux
// jetons affichent "9", cliquer sur l'un ne doit pas désactiver l'autre).
let pileInsertions = [];

function inserer(texte, jetonEl){
  if(phase !== "saisie") return;

  if(jetonEl){
    if(jetonEl.disabled) return; // déjà utilisé : on ignore le clic
    jetonEl.disabled = true;
    jetonEl.classList.add("utilise");
  }

  const start = expr.selectionStart ?? expr.value.length;
  const end = expr.selectionEnd ?? expr.value.length;

  // Si on insère un nombre négatif juste après un opérateur (+ - * :), on
  // l'entoure automatiquement de parenthèses : "8" + clic sur jeton "-3"
  // donnerait sinon "8+-3", une séquence qu'on refuse explicitement (deux
  // symboles +/-/*/: ne peuvent jamais se suivre, même signe + opérateur).
  let texteAInserer = texte;
  if(/^-\d+$/.test(texte)){
    const caracterePrecedent = expr.value[start - 1];
    if(caracterePrecedent && "+-*:".includes(caracterePrecedent)){
      texteAInserer = `(${texte})`;
    }
  }

  expr.value = expr.value.slice(0,start) + texteAInserer + expr.value.slice(end);
  const pos = start + texteAInserer.length;
  expr.setSelectionRange(pos,pos);
  expr.focus();

  if(jetonEl){
    pileInsertions.push({ pos: start, longueur: texteAInserer.length, jetonEl });
  }

  verifierJetonsEnDirect();
}

function effacerCaractere(){
  if(phase !== "saisie") return;
  const start = expr.selectionStart ?? expr.value.length;
  const end = expr.selectionEnd ?? expr.value.length;

  if(start === end && start > 0){
    // si le caractère supprimé correspond à une insertion de jeton, on réactive ce jeton
    const idx = pileInsertions.findIndex(p => start > p.pos && start <= p.pos + p.longueur);
    if(idx !== -1){
      const { jetonEl } = pileInsertions[idx];
      jetonEl.disabled = false;
      jetonEl.classList.remove("utilise");
      pileInsertions.splice(idx,1);
    }
    expr.value = expr.value.slice(0,start-1) + expr.value.slice(start);
    expr.setSelectionRange(start-1,start-1);
  } else {
    expr.value = expr.value.slice(0,start) + expr.value.slice(end);
    expr.setSelectionRange(start,start);
  }
  expr.focus();
  verifierJetonsEnDirect();
}

operateursZone.querySelectorAll(".op-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(btn.id === "btnEffacer"){
      effacerCaractere();
      return;
    }
    inserer(btn.dataset.op);
  });
});

// Si l'élève tape directement au clavier (plutôt que de cliquer les jetons),
// on resynchronise l'état visuel et "disabled" des jetons à partir du texte,
// en comptant les occurrences pour bien gérer les doublons.
function resynchroniserJetonsDepuisTexte(){
  pileInsertions = []; // la pile ne peut plus être garantie cohérente avec une saisie libre

  const used = extractNumbers(expr.value);
  const restant = countOccurrences(used);

  document.querySelectorAll(".jeton").forEach(j=>{
    const n = j.textContent;
    if(restant[n] && restant[n] > 0){
      j.classList.add("utilise");
      j.disabled = true;
      restant[n]--;
    } else {
      j.classList.remove("utilise");
      j.disabled = false;
    }
  });
}

// Détecte une erreur de jetons AVÉRÉE (doublon, nombre étranger, trop de
// nombres) — et pas simplement une saisie encore incomplète — puis l'affiche
// en direct sur les jetons (vert/faux) et dans le message. Retourne true si
// une telle erreur est affichée (pour que valider() puisse s'arrêter là aussi).
function detecterErreurJetons(usedNums, availableNums){
  const dispoRestants = countOccurrences(availableNums);
  let erreurAvérée = false;

  // un nombre tapé qui ne correspond à aucun jeton disponible
  // ou utilisé plus de fois qu'il n'est disponible : erreur avérée
  usedNums.forEach(n=>{
    if(dispoRestants[n] && dispoRestants[n] > 0){
      dispoRestants[n]--;
    } else {
      erreurAvérée = true;
    }
  });

  // trop de nombres saisis par rapport aux jetons disponibles : erreur avérée
  if(usedNums.length > availableNums.length){
    erreurAvérée = true;
  }

  return erreurAvérée;
}

function afficherAlerteJetons(usedNums, availableNums, detailPersonnalise){
  const usedCount = countOccurrences(usedNums);
  const remaining = { ...usedCount };

  document.querySelectorAll(".jeton").forEach(j=>{
    const n = j.textContent;
    if(remaining[n] && remaining[n] > 0){
      j.classList.add("vert");
      j.classList.remove("faux");
      remaining[n]--;
    } else {
      j.classList.add("faux");
      j.classList.remove("vert");
    }
  });

  let detail = detailPersonnalise;
  if(!detail){
    if(usedNums.length > availableNums.length){
      detail = "Tu utilises trop de nombres : chaque jeton ne sert qu'une seule fois.";
    } else {
      detail = "Un nombre saisi ne correspond à aucun jeton disponible, ou est utilisé en double.";
    }
  }

  definirMessage(
    "Tu dois utiliser chaque jeton exactement une fois." +
    `<span class="detail">${detail}</span>`,
    "erreur"
  );
}

function effacerAlerteJetons(){
  document.querySelectorAll(".jeton").forEach(j=>{
    j.classList.remove("vert","faux");
  });
  message.innerHTML = "";
  message.className = "";
}

function verifierJetonsEnDirect(){
  if(phase !== "saisie") return;

  const usedNums = extractNumbers(expr.value);
  const availableNums = [game.a, game.b, game.c].map(f => f.nb.toString());

  if(detecterErreurJetons(usedNums, availableNums)){
    afficherAlerteJetons(usedNums, availableNums);
  } else {
    effacerAlerteJetons();
  }
}

expr.addEventListener("input", ()=>{
  resynchroniserJetonsDepuisTexte();
  verifierJetonsEnDirect();
});

// ==================== MESSAGES PÉDAGOGIQUES ====================

function expliquerStructureInvalide(value){
  if(value.trim() === ""){
    return "Écris une expression avec les 3 jetons, par exemple en cliquant sur les jetons puis sur un opérateur.";
  }
  if(!/[+\-*:]/.test(value)){
    return "Il manque au moins une opération (+, −, ×, ÷) entre les nombres.";
  }

  const lex = tokenizeExpression(value.replace(/\s+/g,""));

  if(lex.erreur === "signe_apres_operateur"){
    return "Un signe « − » ne peut pas suivre directement un opérateur. Pour un nombre négatif après une opération, entoure-le de parenthèses, par exemple 8+(−3).";
  }
  if(lex.erreur === "deux_operateurs_consecutifs"){
    return "Deux opérateurs ne peuvent pas se suivre directement.";
  }
  if(lex.erreur === "signe_sans_chiffre"){
    return "Un signe « − » doit être immédiatement suivi d'un chiffre.";
  }
  if(lex.erreur === "caractere_invalide"){
    return "Cette expression contient un caractère qui n'est pas reconnu.";
  }

  if((value.match(/\(/g)||[]).length !== (value.match(/\)/g)||[]).length){
    return "Les parenthèses ne sont pas équilibrées : vérifie qu'il y a bien une ouverture pour chaque fermeture.";
  }

  if(!lex.erreur){
    const parsed = construireArbreExpression(lex.tokens);
    if(!parsed.erreur){
      const nbNombres = compterNombresArbre(parsed.arbre);
      const nbOperations = compterOperationsArbre(parsed.arbre);
      if(nbNombres !== 3 || nbOperations !== 2){
        return "Utilise exactement les 3 jetons avec 2 opérations au total.";
      }
    }
  }

  return "Cette structure n'est pas reconnue. Utilise au plus deux opérations, avec éventuellement des parenthèses, par exemple (3+9)×7 ou 3+9×7.";
}

function definirMessage(html, type){
  message.innerHTML = html;
  message.className = type || "";
}

function finQuestion(){
  phase = "next";
  expr.disabled = true;
  btnValider.style.display = "none";
  btnNext.style.display = "inline-block";
}

function valider(){
  if(phase !== "saisie") return;

  // 1) Extraction des nombres utilisés
  const usedNums = extractNumbers(expr.value);
  const availableNums = [game.a, game.b, game.c].map(f => f.nb.toString());

  // 2) Reset visuel des jetons (le marquage utilise/vert/faux est recalculé juste après)
  document.querySelectorAll(".jeton").forEach(j=>{
    j.classList.remove("vert","faux");
  });

  // 3) Vérification stricte des jetons
  const bonsJetons = checkJetons(usedNums, availableNums);

  // 4) Parsing (structure + calculabilité)
  const parsed = parseExpressionStrict(
    expr.value,
    [game.a, game.b, game.c]
  );

  // ── CAS 1 : mauvais jetons (manquants, en trop, ou doublon)
  if(!bonsJetons){
    let detail;
    if(usedNums.length === 0){
      detail = "Utilise les trois jetons : " + availableNums.join(", ") + ".";
    } else if(usedNums.length < availableNums.length){
      detail = "Il manque au moins un jeton parmi : " + availableNums.join(", ") + ".";
    } else if(usedNums.length > availableNums.length){
      detail = "Tu utilises trop de nombres : chaque jeton ne sert qu'une seule fois.";
    } else {
      detail = "Les nombres utilisés ne correspondent pas exactement aux jetons proposés.";
    }

    afficherAlerteJetons(usedNums, availableNums, detail);

    expr.focus();
    return;
  }

  // ── CAS 2 : structure non calculable
  if(!parsed){
    definirMessage(
      "L'expression n'est pas calculable telle quelle." +
      `<span class="detail">${expliquerStructureInvalide(expr.value)}</span>`,
      "erreur"
    );

    document.querySelectorAll(".jeton")
      .forEach(j => j.classList.add("vert"));

    expr.focus();
    return;
  }

  // ── À partir d'ici : calculable (juste ou faux)
  const latex = latexSteps(parsed, game.target.statut);

  // ── CAS 3 : réponse correcte
  if(parsed.resultat.equals(game.target)){
    score++;

    finQuestion();

    document.querySelectorAll(".jeton")
      .forEach(j => j.classList.add("vert"));

    definirMessage(
      "Bravo, c'est exact !" + latex,
      "ok"
    );

    majBandeau();
    MathJax.typesetPromise([message]);
    return;
  }

  // ── CAS 4 : calcul faux mais valide
  finQuestion();

  document.querySelectorAll(".jeton")
    .forEach(j => j.classList.add("vert"));

  definirMessage(
    "Ton expression donne un résultat différent de \\(" +
    game.target.toLatex(game.target.statut) +
    "\\)." + latex,
    "erreur"
  );

  majBandeau();
  MathJax.typesetPromise([message]);
  return;
}

// ==================== FICHE PAPIER (overlay) ====================
// Réutilise les mêmes fonctions de génération que le jeu (generate(),
// classeFraction(), Fraction, niveau) pour garantir des exercices papier
// strictement cohérents avec le jeu. Utilise des compteurs d'équilibrage
// INDÉPENDANTS de ceux de la partie en cours, pour ne jamais perturber
// la progression ni les statistiques de la partie en cours.
const NB_EXERCICES_FICHE = 10;

function choisirClasseIndependant(resultatsParClasse, statsLocales, indexLocal){
  const total = indexLocal || 1;
  const classesPossibles = Object.keys(resultatsParClasse)
    .filter(c => resultatsParClasse[c].length > 0);

  const etats = classesPossibles.map(c => ({
    classe: c,
    retard: (statsLocales[c] / total) - frequencesCibles[c]
  }));

  etats.sort((a,b) => a.retard - b.retard);
  return etats[0].classe;
}

function genererSerieFiche(nb){
  const statsLocales = { entier: 0, fraction_simple: 0, decimal: 0, mixte: 0 };
  const exercices = [];

  for(let i = 1; i <= nb; i++){
    const game = generate();
    const classeCible = choisirClasseIndependant(game.resultatsParClasse, statsLocales, i);
    const candidats = game.resultatsParClasse[classeCible];
    const sol = candidats[Math.random() * candidats.length | 0];

    statsLocales[classeCible]++;

    exercices.push({
      jetons: [game.a.nb, game.b.nb, game.c.nb],
      cibleLatex: sol.resultat.toLatex(sol.resultat.statut),
      cibleN: sol.resultat.n,
      cibleD: sol.resultat.d,
      cibleStatut: sol.resultat.statut,
      classe: classeCible
    });
  }

  return exercices;
}

let serieFicheActuelle = [];

// Rendu HTML/CSS pur d'une cible (entier, fraction, ou nombre mixte), SANS
// dépendre de MathJax. C'est plus fiable à l'impression : pas de timing de
// rendu asynchrone, pas de dépendance réseau, et un résultat identique à
// l'écran et sur papier.
function formaterCibleHTML(ex){
  const { cibleN: n, cibleD: d, cibleStatut: statut } = ex;

  if(statut === "entier"){
    return `<span class="nb">${n}</span>`;
  }
  if(statut === "decimal"){
    const valeur = (n / d).toString().replace(".", ",");
    return `<span class="nb">${valeur}</span>`;
  }
  if(statut === "simplifie"){
    return `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`;
  }
  // mixte_simplifie : partie entière + fraction
  const e = Math.trunc(n / d);
  const r = Math.abs(n - e * d);
  return `<span class="nb">${e}+</span><span class="frac"><span class="num">${r}</span><span class="den">${d}</span></span>`;
}

function rendreTableauFiche(exercices){
  const wrap = document.getElementById("ficheTableWrap");

  const lignes = exercices.map((ex, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${ex.jetons[0]}</td>
      <td>${ex.jetons[1]}</td>
      <td>${ex.jetons[2]}</td>
      <td>${formaterCibleHTML(ex)}</td>
      <td class="col-expression"></td>
    </tr>
  `).join("");

  wrap.innerHTML = `
    <table>
      <colgroup>
        <!-- >>>> MODIFIER ICI : LARGEUR DES COLONNES (total = 100%) <<<< -->
        <col style="width:8%">   <!-- colonne N°         -->
        <col style="width:10%">  <!-- colonne Jeton 1    -->
        <col style="width:10%">  <!-- colonne Jeton 2    -->
        <col style="width:10%">  <!-- colonne Jeton 3    -->
        <col style="width:17%">  <!-- colonne Cible      -->
        <col style="width:45%">  <!-- colonne Expression -->
      </colgroup>
      <thead>
        <tr>
          <th>N°</th>
          <th colspan="3">Jetons</th>
          <th>Cible</th>
          <th>Expression</th>
        </tr>
      </thead>
      <tbody>${lignes}</tbody>
    </table>
  `;
}

function ouvrirFiche(){
  serieFicheActuelle = genererSerieFiche(NB_EXERCICES_FICHE);
  document.getElementById("overlayFiche").classList.add("ouvert");
  rendreTableauFiche(serieFicheActuelle);
}

function fermerFiche(){
  document.getElementById("overlayFiche").classList.remove("ouvert");
}

// ---------- Export LaTeX (même structure que generer_tex.js) ----------
function genererLatexFiche(exercices){
  // \vphantom{\dfrac{0}{0}} est invisible mais donne à CHAQUE cellule la même
  // hauteur de référence (celle d'une fraction). Sans ça, \Centerstack centre
  // chaque cellule sur SA PROPRE hauteur de contenu : un simple chiffre (1 ligne)
  // et une fraction (2 niveaux) n'aboutissent alors pas au même niveau visuel,
  // même avec Centerstack appliqué partout (c'est ce qui causait le décalage
  // du numéro de ligne, qui semblait "trop bas" par rapport aux autres colonnes).
  const REF = "\\vphantom{\\dfrac{0}{0}}";

  const lignes = exercices.map((ex, i) => {
    const [a,b,c] = ex.jetons;
    return `\\Centerstack{${REF}${i+1}} & \\Centerstack{${REF}${a}} & \\Centerstack{${REF}${b}} & \\Centerstack{${REF}${c}} & \\Centerstack{${REF}$${ex.cibleLatex}$} & \\\\\n\\hline`;
  }).join("\n");

  return `\\documentclass[11pt,a4paper]{article}
\\usepackage[a4paper,margin=2cm]{geometry}
\\usepackage[utf8]{inputenc}
\\usepackage[T1]{fontenc}
\\usepackage[french,provide=*]{babel}
\\usepackage{amsmath}
\\usepackage[table]{xcolor}
\\usepackage{array}
\\usepackage{makecell}
\\definecolor{ardoise}{HTML}{1B2A22}
\\definecolor{grisbrun}{HTML}{6B6155}
\\definecolor{ligne}{HTML}{B9AF9C}
\\definecolor{grisFondN}{HTML}{E9E6DF}
\\pagestyle{empty}
\\setlength{\\parindent}{0pt}
% Hauteur de ligne calée sur la version HTML/écran (70px) :
% extrarowheight ajoute cette hauteur en PLUS de la hauteur naturelle du texte.
\\setlength{\\extrarowheight}{4pt}
\\renewcommand{\\arraystretch}{2}
\\setlength{\\tabcolsep}{7pt}
% Double filet : LaTeX n'a pas d'équivalent direct du border-style:double CSS,
% on simule avec deux traits fins très rapprochés (deux colonnes "||" séparées
% d'un \\arrayrulewidth quasi nul produiraient un seul trait épais ; on utilise
% donc \\doublerulesep réduit + deux barres "||" dans la spec de colonnes).
\\setlength{\\doublerulesep}{0.8pt}
\\begin{document}
% ---- 1) Identité de l'élève (même ordre que l'overlay web) ----
\\noindent
Nom et prénom~: \\hrulefill \\hspace{1.2cm} Note~: \\hrulefill\\,/ 20
\\vspace{30pt}
% ---- 2) Titre ----
\\begin{center}
  {\\Huge\\bfseries\\color{ardoise} Le compte est bon}\\\\[20pt]
  {\\large\\color{grisbrun} Avec les trois jetons, retrouve une expression qui donne le nombre indiqué.}
\\end{center}

\\vspace{10pt}
{\\small\\color{grisbrun}
Opérations autorisées~: $+$, $-$, $\\times$, $\\div$, avec parenthèses si besoin.
Chaque~jeton~doit~être~utilisé~exactement~une~fois.
}
\\vspace{10pt}
% ---- 3) Tableau ----
% Colonne N° : grisée (columncolor) + double filet (||) à sa droite.
% Double filet (||) aussi avant Cible et avant Expression, comme à l'écran.
\\begin{center}
\\begin{tabular}{|>{\\columncolor{grisFondN}\\centering\\arraybackslash}p{1.2cm}||>{\\centering\\arraybackslash}p{1.4cm}|>{\\centering\\arraybackslash}p{1.4cm}|>{\\centering\\arraybackslash}p{1.4cm}||>{\\centering\\arraybackslash}p{2.6cm}||>{\\color{ligne}}p{6.5cm}|}
\\hline
\\multicolumn{1}{|c||}{\\bfseries N°} &
\\multicolumn{3}{c||}{\\bfseries Jetons} &
\\multicolumn{1}{c||}{\\bfseries Cible} &
\\multicolumn{1}{c|}{\\bfseries Expression} \\\\
\\hline
${lignes}
\\hline

\\end{tabular}
\\end{center}
\\end{document}
`;
}

function telechargerTex(){
  const tex = genererLatexFiche(serieFicheActuelle);
  const blob = new Blob([tex], { type: "text/x-tex;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "fiche-compte-est-bon.tex";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
