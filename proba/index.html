<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Aléatoire Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="dashboard">
        
        <section class="panel-controls">
            <div class="control-group-block">
                <label>Modèle :</label>
                <select id="experience-select">
                    <option value="des">Somme de deux dés 🎲+🎲</option>
                    <option value="pieces">Lancers de pièces (Pile / Face)</option>
                    <option value="produit">Produit de deux dés</option> 
                    <option value="urne">Urne multicolore 🟦🟥🟨</option>
                    <option value="marche">Marche Aléatoire 🧭</option> 
                </select>
            </div>

            <div class="control-group-block">
                <label>Flux :</label>
                <div class="view-mode-selector">
                    <button class="btn active" id="btn-mode-step">Pas à pas</button>
                    <button class="btn" id="btn-mode-infinite">Continu</button>
                </div>
            </div>

            <div class="control-timeline">
                <button class="btn-control btn-play" id="control-play">Play ▶️</button>
                <button class="btn-control btn-next" id="control-next">Suivant ⏭️</button>
                <button class="btn-control btn-reset" id="control-reset">Reset 🔄</button>
            </div>

            <button id="btn-open-settings" class="btn-control btn-settings-trigger">Options Avancées ⚙️</button>
        </section>

        <div class="panel-main-lab">
            
            <div class="visual-left-column">
                
                <div class="lab-sub-panel">
                    <div class="experience-desc-box" id="display-desc">...</div>
                </div>

                <div class="lab-sub-panel">
                    <div class="visual-container-box" id="main-render-viewport">
                        <span style="color: var(--text-muted);">En attente de lancement</span>
                    </div>
                </div>

                <div class="data-section-counter">
                    <h3>Total expériences : <span id="total-count">0</span></h3>
                </div>
                
            </div>

<div class="panel-results">
                <h2>Résultats & Analyses</h2> 
                
                <div class="results-scroll-content">
                    
                    <div class="data-section">
                        <div class="data-section-header">
                            <h3>Échantillon (100 premiers lancers)</h3>
                            <button id="btn-toggle-sample" class="btn-toggle">👁️ Afficher</button>
                        </div>
                        <div id="container-sample-view" class="hidden"> <div id="sample-grid" class="sample-analysis-grid"></div>
                        </div>
                    </div>

                    <div class="data-section">
                        <div class="data-section-header">
                            <div class="data-section-title-block">
                                <h3>Histogramme</h3>
                                <div class="phet-display-selector">
                                    <button id="btn-phet-count" class="btn-phet">Effectif</button>
                                    <button id="btn-phet-freq" class="btn-phet active">Fréquence</button>
                                </div>
                            </div>
                            <button id="btn-toggle-chart" class="btn-toggle">👁️ Afficher</button>
                        </div>
                        <div id="chart-container" class="chart-grid hidden"> </div>
                    </div>

                    <div class="data-section" id="event-tracking-zone">
                        <div class="data-section-header">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <h3>Suivi de l'Événement A</h3>
                                <button id="btn-open-event-settings" class="btn-toggle-event-settings">⚙️ Modifier</button>
                            </div>
                            <button id="btn-toggle-event" class="btn-toggle">👁️ Afficher</button>
                        </div>
                        <div id="event-container" class="hidden"> <div id="display-set" style="font-family: monospace; font-size: 0.85rem; color: var(--warning); margin-bottom: 8px;">A = { ... }</div>
                            <div class="event-gauge-track">
                                <div id="event-marker" class="event-marker"></div>
                                <div id="event-fill" class="event-fill">Calcul en cours...</div>
                            </div>
                        </div>
                    </div>

                    <div class="data-section">
                        <div class="data-section-header">
                            <h3>Données complètes</h3>
                            <button id="btn-toggle-table" class="btn-toggle">👁️ Afficher</button>
                        </div>
                        <div id="table-container" class="hidden"> <table class="results-table">
                                <thead>
                                    <tr>
                                        <th id="th-issue-name">Issue</th>
                                        <th>Effectif</th>
                                        <th>Fréquence</th>
                                        <th style="color:var(--warning);">Proba Th.</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>
                    </div>
                    
                </div>
            </div>
        
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Options Avancées</h3>
                <button id="btn-close-settings" class="modal-close-btn">Fermer</button>
            </div>
            
            <div class="modal-body-content">
                <div class="config-inside-box">
                    <label>Modèle théorique :</label>
                    <div class="view-mode-selector">
                        <button class="btn" id="btn-theory-show">Théorie 👁️</button>
                        <button class="btn active" id="btn-theory-hide">Masquer 🙈</button>
                    </div>
                </div>

                <div class="config-inside-box">
                    <div class="control-group-slider">
                        <label for="speed-slider">Vitesse du Pas-à-pas :</label>
                        <div class="slider-wrapper">
                            <input type="range" id="speed-slider" min="200" max="2000" step="100" value="500">
                            <span id="speed-value" class="slider-value">500ms</span>
                        </div>
                    </div>
                    <div class="control-group-slider">
                        <label for="batch-slider">Taille des paquets :</label>
                        <div class="slider-wrapper">
                            <input type="range" id="batch-slider" min="10" max="1000" step="10" value="100">
                            <span id="batch-value" class="slider-value">100</span>
                        </div>
                    </div>
                    <div class="control-group-slider">
                        <label for="height-slider">Zoom Fréquences :</label>
                        <div class="slider-wrapper">
                            <input type="range" id="height-slider" min="10" max="100" step="5" value="40">
                            <span id="height-value" class="slider-value">40%</span>
                        </div>
                    </div>
                </div>

                <div class="config-inside-box">
                    <div class="dynamic-settings-box" id="dynamic-settings-viewport"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
