<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rectiformes Numériques</title>
  <link rel="stylesheet" href="style.css" />
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<header class="app-header">
  <h1 id="titre_appli">Rectiformes</h1>
  <div class="header-actions" id="topButtonsBar">
    <button id="btnAtelier" type="button" class="btn-header active">Atelier</button>
    <button id="btnQuiz" type="button" class="btn-header">Quiz</button>
  </div>
</header>

<div class="split-layout">

  <!-- ===== PANNEAU CONTRÔLE ===== -->
  <div class="panel control-panel">

    <div class="panel-group">
      <div class="panel-label">Type</div>
      <div class="mode-toggle-group">
        <button id="btnAire" type="button" class="mode-toggle-btn">Aire</button>
        <button id="btnPeri" type="button" class="mode-toggle-btn">Périmètre</button>
      </div>
    </div>

    <div class="panel-filet"></div>

    <div class="panel-group">
      <div class="panel-label">Mode de validation</div>
      <div class="mode-toggle-group">
        <button id="btnNumerique" type="button" class="mode-toggle-btn">Numérique</button>
        <button id="btnLitteral" type="button" class="mode-toggle-btn">Littéral</button>
      </div>
    </div>

    <div class="panel-filet" id="quizFilet"></div>

    <div class="panel-group" id="quizGroup">
      <div class="panel-label">Quiz</div>
      <div id="quizPanel"></div>
    </div>

    <div class="panel-filet"></div>

    <button id="skipButton" class="panel-btn">Renoncer</button>

  </div>

  <!-- ===== PANNEAU RÉPONSE ===== -->
  <div class="panel answer-panel">

    <div class="panel-label">Exercice</div>

    <div id="questionType">
      Choisir un mode
    </div>

    <section class="interaction-section">

      <div class="input-wrapper">
        <input type="text"
               id="expressionInput"
               placeholder="Ex : a*b + c^2"
               autocomplete="off"
               spellcheck="false" />
        <div id="inputHighlight" class="input-highlight" aria-hidden="true"></div>
      </div>

    
      <div id="latexPreview"></div>

      

    </section>

     <div class="buttons-wrapper">
        <button id="validateBtn">Valider</button>
      </div>


    <div id="feedback"></div>

  </div>

  <!-- ===== PANNEAU CANEVAS ===== -->
  <div class="panel canvas-panel">

    <section class="figure-section">
<canvas id="figureCanvas" width="400" height="313"></canvas>
      <div class="params">
        <button id="reRollBtn" title="Retirer a, b, c">🎲</button>
        <div class="param a-color">
          a<span id="eqA"> = </span><strong id="valA"></strong>
        </div>
        <div class="param b-color">
          b<span id="eqB"> = </span><strong id="valB"></strong>
        </div>
        <div class="param c-color">
          c<span id="eqC"> = </span><strong id="valC"></strong>
        </div>
        <button id="toggleValuesBtn">👁️</button>
      </div>
    </section>

  </div>

</div>
  <script src="Nombre.js"></script>
  <script src="calcul-mv.js"></script>
  <script src="Guide.js"></script>
  <script src="rectis.js"></script>
  <script src="script.js"></script>
</body>
</html>
