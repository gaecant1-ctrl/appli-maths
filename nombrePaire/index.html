<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Appariement Écritures des nombres</title>
  <link rel="stylesheet" href="style.css" />
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']]
    },
    svg: {
      // 'local' plutôt que 'global' : chaque formule embarque ses propres
      // tracés de glyphes, au lieu de référencer un <svg> de définitions
      // partagé ajouté une seule fois en fin de <body>. Avec 'global', ce
      // conteneur de définitions se retrouve hors de l'overlay #overlayFicheAppariement
      // et donc masqué par notre CSS d'impression (body * { visibility:hidden })
      // — ce qui peut faire retomber les formules imprimées sur un rendu de
      // secours plus épais au lieu des vrais tracés MathJax.
      fontCache: 'local'
    }
  };
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<header class="game-header">
  <div class="header-inner">
    
    <div class="game-title">Écritures des nombres</div>

    <div class="header-actions" id="headerActions"></div>

  </div>
</header>
  <div id="zoneJeu">

    <div class="jeu-info" id="jeuInfo">
      <div class="vies" id="vies"></div>
      <div class="stars" id="stars"></div>
    </div>

    <div id="grid"></div>

  </div>

  <script type="module" src="main.js?v=3"></script>
</body>
</html>
